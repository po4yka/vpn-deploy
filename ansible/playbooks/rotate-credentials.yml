---
# Rotate per-device credentials. The actual UUID/shortId/peer-key generation
# happens locally via scripts/new-client.sh + sops re-encrypt; this playbook
# only re-renders server-side configs and reloads services.
#
# See docs/RUNBOOK-rotate.md for the full procedure.

- name: Re-render and reload after credential rotation
  hosts: vpn
  become: true
  gather_facts: true

  vars_files:
    - "{{ lookup('env', 'VPN_SECRETS_FILE') }}"

  tasks:
    - name: Re-render Xray config
      ansible.builtin.template:
        src: ../roles/xray/templates/config.json.j2
        dest: /etc/xray/config.json
        owner: root
        group: xray
        mode: "0640"
        validate: "/usr/local/bin/xray run -test -config %s"
      no_log: true
      diff: false
      when: vpn.enable_xray_reality | default(true)
      notify: Restart xray

    - name: Re-render Hysteria config
      ansible.builtin.template:
        src: ../roles/hysteria/templates/config.yaml.j2
        dest: /etc/hysteria/config.yaml
        owner: root
        group: hysteria
        mode: "0640"
      no_log: true
      diff: false
      when: vpn.enable_hysteria | default(false)
      notify: Restart hysteria

    - name: Re-render AmneziaWG peers
      ansible.builtin.template:
        src: ../roles/amneziawg/templates/awg0.conf.j2
        dest: /etc/amnezia/amneziawg/awg0.conf
        owner: root
        group: root
        mode: "0600"
      no_log: true
      diff: false
      when: vpn.enable_amneziawg | default(false)
      notify: Reload amneziawg

  handlers:
    - name: Restart xray
      ansible.builtin.systemd_service:
        name: xray
        state: restarted

    - name: Restart hysteria
      ansible.builtin.systemd_service:
        name: hysteria-server
        state: restarted

    - name: Reload amneziawg
      ansible.builtin.command:
        cmd: awg syncconf awg0 /etc/amnezia/amneziawg/awg0.conf
      changed_when: true
