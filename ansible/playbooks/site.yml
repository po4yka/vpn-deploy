---
- name: Provision VPN VPS — full stack
  hosts: vpn
  become: true
  gather_facts: true

  vars_files:
    - "{{ lookup('env', 'VPN_SECRETS_FILE') }}"

  pre_tasks:
    - name: Ensure VPN_SECRETS_FILE was provided
      ansible.builtin.assert:
        that:
          - lookup('env', 'VPN_SECRETS_FILE') | length > 0
        fail_msg: |
          VPN_SECRETS_FILE is not set. Run `make decrypt` or export the path
          to your decrypted secrets file before running this playbook.

  roles:
    - role: baseline
      tags: [baseline, always]

    - role: firewall
      tags: [firewall, always]

    - role: xray
      when: vpn.enable_xray_reality | default(true)
      tags: [xray, p0, transport]

    - role: geodata
      when: (vpn.enable_xray_reality | default(true)) and (vpn.enable_geodata | default(true))
      tags: [geodata, xray]

    - role: nginx-xhttp
      when: vpn.enable_nginx_xhttp | default(true)
      tags: [nginx, xhttp, p1, transport]

    - role: naive
      when: vpn.enable_naive | default(false)
      tags: [naive, p1, transport]

    - role: hysteria
      when: vpn.enable_hysteria | default(false)
      tags: [hysteria, p2, transport]

    - role: amneziawg
      when: vpn.enable_amneziawg | default(false)
      tags: [amneziawg, awg, p2, transport]

    - role: monitoring
      when: vpn.enable_monitoring | default(true)
      tags: [monitoring]

    - role: watchdog
      when: vpn.enable_watchdog | default(true)
      tags: [watchdog, monitoring]

    - role: backup
      when: vpn.enable_backup | default(true)
      tags: [backup]

    - role: subscription-host
      when: vpn.enable_subscription_host | default(false)
      tags: [subscription]
