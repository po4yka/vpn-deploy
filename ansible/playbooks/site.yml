---
- name: Provision VPN VPS — full stack
  hosts: vpn
  become: true
  gather_facts: true

  vars:
    vpn_secrets_file: >-
      {{
        lookup('env', 'VPN_SECRETS_FILE')
        | default(playbook_dir ~ '/../../secrets/prod.secrets.example.yaml', true)
      }}

  vars_files:
    - "{{ vpn_secrets_file }}"

  pre_tasks:
    - name: Ensure VPN_SECRETS_FILE was provided
      ansible.builtin.assert:
        that:
          - lookup('env', 'VPN_SECRETS_FILE') | length > 0
        fail_msg: |
          VPN_SECRETS_FILE is not set. Run `make decrypt` or export the path
          to your decrypted secrets file before running this playbook.

  # Hosts in the `vpn-subscription-only` inventory group skip every
  # transport-class role and run only baseline + firewall + the
  # subscription-host role + supporting services (monitoring /
  # watchdog / backup). See docs/SUBSCRIPTION-HOST-SEPARATION.md.

  roles:
    - role: baseline
      tags: [baseline, always]

    - role: firewall
      tags: [firewall, always]

    - role: xray
      when: (vpn.enable_xray_reality | default(true)) and not (vpn_subscription_only | default(false))
      tags: [xray, p0, transport]

    - role: geodata
      when: (vpn.enable_xray_reality | default(true)) and (vpn.enable_geodata | default(true)) and not (vpn_subscription_only | default(false))
      tags: [geodata, xray]

    - role: nginx-xhttp
      when: (vpn.enable_nginx_xhttp | default(true)) and not (vpn_subscription_only | default(false))
      tags: [nginx, xhttp, p1, transport]

    - role: cdn-front
      when: (vpn.enable_cdn_front | default(false)) and not (vpn_subscription_only | default(false))
      tags: [cdn-front, p1, transport]

    - role: naive
      when: (vpn.enable_naive | default(false)) and not (vpn_subscription_only | default(false))
      tags: [naive, p1, transport]

    - role: hysteria
      when: (vpn.enable_hysteria | default(false)) and not (vpn_subscription_only | default(false))
      tags: [hysteria, p2, transport]

    - role: amneziawg
      when: (vpn.enable_amneziawg | default(false)) and not (vpn_subscription_only | default(false))
      tags: [amneziawg, awg, p2, transport]

    - role: monitoring
      when: vpn.enable_monitoring | default(true)
      tags: [monitoring]

    - role: watchdog
      when: vpn.enable_watchdog | default(true)
      tags: [watchdog, monitoring]

    - role: backup
      when: vpn.enable_backup | default(true)
      tags: [backup]

    - role: subscription-host
      when: (vpn.enable_subscription_host | default(false)) or (vpn_subscription_only | default(false))
      tags: [subscription]

    - role: warp-outbound
      when: (vpn.enable_warp_outbound | default(false)) and not (vpn_subscription_only | default(false))
      tags: [warp, outbound]

    - role: honeypot
      when: (vpn.enable_honeypot | default(false)) and not (vpn_subscription_only | default(false))
      tags: [honeypot, defensive]

    - role: probe-ratelimit
      when: (vpn.enable_probe_ratelimit | default(false)) and not (vpn_subscription_only | default(false))
      tags: [probe-ratelimit, defensive]
