---
- name: Rollback Xray binary to a pinned previous release
  hosts: vpn
  become: true
  gather_facts: false

  vars:
    rollback_xray_version: "{{ lookup('env', 'ROLLBACK_XRAY_VERSION') }}"

  tasks:
    - name: ROLLBACK_XRAY_VERSION is set
      ansible.builtin.assert:
        that:
          - rollback_xray_version | length > 0
        fail_msg: "ROLLBACK_XRAY_VERSION env var is required (e.g. v26.3.27)."

    - name: Target rollback release exists on disk
      ansible.builtin.stat:
        path: "/opt/xray/releases/{{ rollback_xray_version }}/xray"
      register: rb_release
      failed_when: not rb_release.stat.exists

    - name: Point /opt/xray/current at the rollback release
      ansible.builtin.file:
        src: "/opt/xray/releases/{{ rollback_xray_version }}"
        dest: "/opt/xray/current"
        state: link
        force: true

    - name: Validate current config with rollback binary
      ansible.builtin.command:
        cmd: /usr/local/bin/xray run -test -config /etc/xray/config.json
      changed_when: false

    - name: Restart Xray
      ansible.builtin.systemd_service:
        name: xray
        state: restarted

    - name: Verify Xray active after rollback
      ansible.builtin.command:
        cmd: systemctl is-active xray
      register: active
      changed_when: false
      failed_when: active.stdout != "active"
