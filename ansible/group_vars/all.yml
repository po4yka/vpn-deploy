---
# Tunables shared across every host. Secrets do NOT live here — they are
# loaded at runtime from VPN_SECRETS_FILE in playbook vars_files.

vpn:
  # Toggle individual transport profiles. P0 (xray-reality) is always on.
  enable_xray_reality: true
  enable_nginx_xhttp: true        # P1 — direct, no CDN baseline
  enable_naive: false             # P1 alternative; do not share a public port with nginx-xhttp
  enable_hysteria: true           # P2 — UDP/443
  enable_amneziawg: true          # P2 — device-VPN
  enable_geodata: true            # geosite/geoip pinned + daily refresh
  enable_monitoring: true
  enable_watchdog: true           # local probe + ntfy/Pushover alerts
  enable_backup: true
  enable_subscription_host: false # opt-in; not in v1 default deploy

  # P0 flow mode — switches the VLESS+REALITY inbound between two shapes:
  #   vision (default) — `xtls-rprx-vision` flow, no mux. Best on
  #                       networks not policing per-IP TLS concurrency.
  #   mux              — drops vision-flow, enables mux on the inbound.
  #                       Use on home ISPs hitting the ~12-concurrent-TLS
  #                       rule documented in tls-policing-home-isps
  #                       (MTS/MGTS/RTK Izhevsk/JustLan/LanInterCom; 50+
  #                       ASNs as of 2026-05). The block lasts 60-120 s
  #                       after the threshold is crossed; mux holds
  #                       concurrent TLS sessions below the threshold by
  #                       multiplexing application streams over fewer
  #                       physical TLS connections.
  # To disable the P0 listener entirely, set enable_xray_reality: false
  # and rely on enable_nginx_xhttp for transport.
  xray_flow_mode: vision

  # Optional Xray Finalmask obfuscation (Sudoku) on the P0 inbound.
  # Disabled by default — turning it on changes the byte distribution
  # signature, so flip it only after a target network stops accepting
  # the vanilla REALITY shape.
  xray_finalmask: false

# nftables policy
allowed_ssh_cidrs: []  # populated from terraform tfvars; see render-inventory.sh

# Ports
xray_port: 443
nginx_xhttp_public_port: 8443 # public nginx listener; direct-only cohorts may override to 443
nginx_xhttp_port: 10085       # localhost-only Xray XHTTP inbound behind nginx
hysteria_port: 443
# Optional Hysteria2 port-hopping. When set to a "low-high" string
# (e.g. "20000-40000") the role opens that UDP range in nftables, the
# server listens on it, and emit-singbox.sh writes server_ports +
# hop_interval into client configs. Empty = no port-hopping.
hysteria_port_range: ""
hysteria_hop_interval: "30s"

# Paths
xray_install_root: /opt/xray
xray_config_dir: /etc/xray
xray_log_dir: /var/log/xray

hysteria_install_root: /opt/hysteria
hysteria_config_dir: /etc/hysteria
hysteria_log_dir: /var/log/hysteria

amneziawg_config_dir: /etc/amnezia/amneziawg

# Backup
restic_repo_dir: /var/backups/vpn-restic   # local-first; remote sync is opt-in
