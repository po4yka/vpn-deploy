---
- name: Verify cdn-front role
  hosts: all
  become: true
  tasks:
    - name: nginx config parses
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: nftables config parses
      ansible.builtin.command:
        cmd: nft -c -f /etc/nftables.conf
      changed_when: false

    - name: CDN-front site is enabled
      ansible.builtin.stat:
        path: /etc/nginx/sites-enabled/cdn-front.conf
      register: cdn_site
      failed_when: not cdn_site.stat.exists or not cdn_site.stat.islnk

    - name: Refresh script writes IPv4 and IPv6 Cloudflare prefix caches
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q '^198\.51\.100\.0/24$' /etc/cdn-front/cloudflare.v4
          grep -q '^2001:db8:cf::/48$' /etc/cdn-front/cloudflare.v6
          grep -q '^set_real_ip_from 2001:db8:cf::/48;$' /etc/cdn-front/cloudflare.real_ip
        executable: /bin/bash
      changed_when: false

    - name: nginx listens on IPv4 and IPv6 CDN-front port
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q 'listen 8443 ssl http2;' /etc/nginx/sites-available/cdn-front.conf
          grep -q 'listen \[::\]:8443 ssl http2;' /etc/nginx/sites-available/cdn-front.conf
        executable: /bin/bash
      changed_when: false

    - name: nftables restricts CDN-front origin traffic for IPv4 and IPv6
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q 'set cdn_front_origins {' /etc/nftables.conf
          grep -q 'type ipv4_addr' /etc/nftables.conf
          grep -q 'set cdn_front_origins_v6 {' /etc/nftables.conf
          grep -q 'type ipv6_addr' /etc/nftables.conf
          grep -q 'tcp dport 8443 ip saddr @cdn_front_origins accept' /etc/nftables.conf
          grep -q 'tcp dport 8443 ip6 saddr @cdn_front_origins_v6 accept' /etc/nftables.conf
          ! grep -q '^    tcp dport 8443 accept$' /etc/nftables.conf
        executable: /bin/bash
      changed_when: false

    - name: Refresh script targets both nftables CDN-front sets
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q 'nft flush set inet filter cdn_front_origins_v6' /etc/cron.daily/cdn-front-refresh-cf-prefixes
          grep -q 'nft add element inet filter cdn_front_origins_v6' /etc/cron.daily/cdn-front-refresh-cf-prefixes
        executable: /bin/bash
      changed_when: false
