---
# cdn-on scenario — exercises the cdn-front role with vpn.enable_cdn_front: true.
# This variant asserts:
#   * real-IP restoration block present in nginx vhost
#   * AOP cert path consumed (stubbed — cert generation needs network)
#   * Origin CA cert generation step is idempotent
#   * Cloudflare prefix refresh cron / nftables sets are in place
#
# Distinct from the default scenario which uses enable_cdn_front: true already;
# this scenario adds AOP cert stubbing and deeper vhost assertions.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: vpn-cdn-front-cdn-on-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../..
  inventory:
    host_vars:
      vpn-cdn-front-cdn-on-debian13:
        ansible_user: root

verifier:
  name: ansible

scenario:
  name: cdn-on
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
