---
- name: Verify baseline role
  hosts: all
  become: true
  tasks:
    - name: Collect service facts
      ansible.builtin.service_facts:

    - name: nftables installed
      ansible.builtin.command:
        cmd: nft --version
      changed_when: false

    - name: systemd-resolved drop-in present when service exists
      ansible.builtin.stat:
        path: /etc/systemd/resolved.conf.d/no-stub.conf
      register: resolved_dropin
      failed_when: not resolved_dropin.stat.exists or not resolved_dropin.stat.isreg
      when: "'systemd-resolved.service' in ansible_facts.services"

    - name: SSH hardening drop-in present
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config.d/20-ansible-hardening.conf
      register: hardening
      failed_when: not hardening.stat.exists

    - name: sysctl tuning installed
      ansible.builtin.stat:
        path: /etc/sysctl.d/90-vpn.conf
      register: sysctl
      failed_when: not sysctl.stat.exists

    - name: timesync enabled
      ansible.builtin.command:
        cmd: systemctl is-enabled systemd-timesyncd
      register: ts
      changed_when: false
      failed_when: ts.stdout != "enabled"

    # State-level: prove sshd is alive and the hardening drop-in took
    # effect (PasswordAuthentication=no must appear in the effective
    # config rendered by sshd -T).
    - name: sshd.service is active
      ansible.builtin.command:
        cmd: systemctl is-active ssh.service
      register: sshd_active
      changed_when: false
      failed_when: sshd_active.stdout != "active"

    - name: sshd -T applies the hardening drop-in
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          sshd -T 2>/dev/null | awk '$1=="passwordauthentication"{print $2}' \
            | grep -q '^no$'
        executable: /bin/bash
      changed_when: false
