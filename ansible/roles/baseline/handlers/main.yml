---
- name: Reload ssh
  ansible.builtin.systemd_service:
    name: ssh
    state: reloaded

- name: Apply sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true

- name: Restart systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted
