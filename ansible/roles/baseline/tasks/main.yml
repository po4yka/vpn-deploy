---
# Baseline OS hardening: distro packages, sshd hardening, sysctl tuning,
# timesync. Runs on every VPS as the first role in site.yml.

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - jq
      - unzip
      - nftables
      - logrotate
      - systemd-timesyncd
      - rsync
      - htop
      - dnsutils
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Ensure systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: "'systemd-resolved.service' in ansible_facts.services"

- name: Disable systemd-resolved listening on 53 (we'll let resolvconf manage)
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/no-stub.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Resolve]
      DNSStubListener=no
  notify: Restart systemd-resolved
  when: "'systemd-resolved.service' in ansible_facts.services"

- name: Ensure timesync is enabled
  ansible.builtin.systemd_service:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Drop SSH hardening config
  ansible.builtin.template:
    src: sshd_config.d-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/20-ansible-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Reload ssh

- name: Drop sysctl tuning
  ansible.builtin.template:
    src: sysctl-vpn.conf.j2
    dest: /etc/sysctl.d/90-vpn.conf
    owner: root
    group: root
    mode: "0644"
  notify: Apply sysctl

- name: Enable IP forwarding only when AmneziaWG is in scope
  ansible.builtin.copy:
    dest: /etc/sysctl.d/91-vpn-forward.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1
  notify: Apply sysctl
  when: vpn.enable_amneziawg | default(false)

- name: Remove forwarding sysctl when AmneziaWG is disabled
  ansible.builtin.file:
    path: /etc/sysctl.d/91-vpn-forward.conf
    state: absent
  notify: Apply sysctl
  when: not (vpn.enable_amneziawg | default(false))
