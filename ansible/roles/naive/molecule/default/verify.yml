---
# Verify naive molecule scenario.
# Asserts:
#   1. Caddyfile is present at expected path (/etc/naive/Caddyfile).
#   2. Caddyfile contains expected NaiveProxy upstream (forward_proxy) block.
#   3. xcaddy version matches the pinned value from defaults/main.yml.
#   4. caddy-naive binary is present (placed by pre_tasks stub, not live build).
# Live xcaddy build is skipped — caddy-naive stub was placed in converge.yml.

- name: Verify naive role
  hosts: all
  become: true
  tasks:
    - name: Caddyfile is present at expected path
      ansible.builtin.stat:
        path: /etc/naive/Caddyfile
      register: caddyfile_stat
      failed_when: not caddyfile_stat.stat.exists

    - name: Caddyfile has restrictive permissions (group naive can read)
      ansible.builtin.assert:
        that:
          - caddyfile_stat.stat.mode == "0640"
        fail_msg: "Caddyfile mode is {{ caddyfile_stat.stat.mode }}, expected 0640"

    - name: Read Caddyfile content
      ansible.builtin.slurp:
        src: /etc/naive/Caddyfile
      register: caddyfile_raw

    - name: Decode Caddyfile
      ansible.builtin.set_fact:
        caddyfile_text: "{{ caddyfile_raw.content | b64decode }}"

    - name: Caddyfile contains forward_proxy block (NaiveProxy upstream)
      ansible.builtin.assert:
        that:
          - caddyfile_text is search('forward_proxy')
        fail_msg: "forward_proxy directive missing from Caddyfile"

    - name: Caddyfile contains basic_auth directive
      ansible.builtin.assert:
        that:
          - caddyfile_text is search('basic_auth')
        fail_msg: "basic_auth missing from Caddyfile forward_proxy block"

    - name: Caddyfile contains probe_resistance directive
      ansible.builtin.assert:
        that:
          - caddyfile_text is search('probe_resistance')
        fail_msg: "probe_resistance missing from Caddyfile"

    - name: Caddyfile contains hide_ip directive
      ansible.builtin.assert:
        that:
          - caddyfile_text is search('hide_ip')
        fail_msg: "hide_ip missing from Caddyfile"

    - name: Caddyfile references TLS cert and key paths
      ansible.builtin.assert:
        that:
          - caddyfile_text is search('/etc/naive/server.fullchain.pem')
          - caddyfile_text is search('/etc/naive/server.key')
        fail_msg: "TLS cert/key paths missing or wrong in Caddyfile"

    - name: caddy-naive binary is present
      ansible.builtin.stat:
        path: /usr/local/bin/caddy-naive
      register: caddy_naive_bin
      failed_when: not caddy_naive_bin.stat.exists

    - name: caddy-naive binary is executable
      ansible.builtin.assert:
        that:
          - caddy_naive_bin.stat.executable
        fail_msg: "caddy-naive is not executable"

    - name: Systemd unit for caddy-naive is present
      ansible.builtin.stat:
        path: /etc/systemd/system/caddy-naive.service
      register: naive_unit
      failed_when: not naive_unit.stat.exists

    - name: Naive config directory has correct group ownership
      ansible.builtin.stat:
        path: /etc/naive
      register: naive_dir
      failed_when: not naive_dir.stat.exists

    - name: Naive config dir is accessible to naive group
      ansible.builtin.assert:
        that:
          - naive_dir.stat.gr_name == "naive"
        fail_msg: "Expected /etc/naive group=naive, got {{ naive_dir.stat.gr_name }}"
