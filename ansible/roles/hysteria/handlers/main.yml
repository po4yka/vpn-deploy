---
- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true

# Notify topic: "Restart hysteria" — both steps run in order via `listen`.
# Handlers cannot use block/rescue, so the prior rollback path is gone;
# any safety net belongs in tasks/main.yml (e.g. validate before write).

- name: Restart hysteria-server
  ansible.builtin.systemd_service:
    name: hysteria-server
    state: restarted
  listen: Restart hysteria

- name: Wait for hysteria-server to become active
  ansible.builtin.command:
    cmd: systemctl is-active hysteria-server
  register: hy_active
  retries: 5
  delay: 2
  until: hy_active.stdout == "active"
  changed_when: false
  listen: Restart hysteria
