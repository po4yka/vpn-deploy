---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: vpn-warp-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../..
  inventory:
    host_vars:
      vpn-warp-debian13:
        ansible_user: root
  config_options:
    defaults:
      callback_result_format: yaml

verifier:
  name: ansible

# Cloudflare WARP CLI cannot register in CI (no reachable Cloudflare
# endpoint). The converge stubs out warp-cli + curl so role tasks
# succeed; verify.yml asserts the service unit shape and that the
# fallback retry counter increments on a synthetic failure.
scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
