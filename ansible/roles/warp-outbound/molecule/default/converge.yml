---
# Full converge for warp-outbound in a privileged systemd container.
# The real cloudflare-warp CLI cannot register in CI (no reachable
# Cloudflare endpoint), so we stub it and systemd-networkd here so the
# role tasks succeed and we can assert service-unit + fallback state.

- name: Converge warp-outbound role
  hosts: all
  become: true
  vars:
    vpn:
      enable_warp_outbound: true
    warp_outbound:
      install_warp_cli: false   # stub is placed in pre_tasks instead
      mode: proxy
      socks_port: 40000
      routing_tag: warp-out

  pre_tasks:
    - name: Install systemd-networkd if absent
      ansible.builtin.apt:
        name: systemd-networkd
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure /usr/bin exists (stub target)
      ansible.builtin.file:
        path: /usr/bin
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install warp-cli stub
      ansible.builtin.copy:
        dest: /usr/bin/warp-cli
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/sh
          # Molecule stub — records invocations and exits 0.
          echo "warp-cli stub: $*" >> /tmp/warp-cli-calls.log
          case "$*" in
            *"registration new"*)
              echo "Success"
              ;;
            *"mode proxy"*)
              echo "Success"
              ;;
            *"proxy port"*)
              echo "Success"
              ;;
            *connect*)
              echo "Success"
              ;;
            *status*)
              echo "Status update: Connected"
              echo "warp=on"
              ;;
          esac
          exit 0

    - name: Install curl stub (for WARP trace check)
      ansible.builtin.copy:
        dest: /usr/local/bin/curl
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/sh
          # Molecule stub — returns a fake warp=on trace for the WARP check.
          echo "warp-cli stub: curl $*" >> /tmp/warp-cli-calls.log
          echo "fl=stub"
          echo "warp=on"
          echo "gateway=stub"
          exit 0

    - name: Ensure warp-svc stub systemd unit (simulates real warp-svc)
      ansible.builtin.copy:
        dest: /etc/systemd/system/warp-svc.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Cloudflare WARP Service (molecule stub)
          After=network-online.target

          [Service]
          Type=simple
          ExecStart=/bin/sh -c 'echo warp-svc stub running; while true; do sleep 3600; done'
          Restart=on-failure
          Environment=WARP_RETRY_COUNTER_FILE=/var/lib/warp-svc/retry_counter

          [Install]
          WantedBy=multi-user.target

    - name: Ensure warp-svc state directory
      ansible.builtin.file:
        path: /var/lib/warp-svc
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Initialise fallback retry counter at zero
      ansible.builtin.copy:
        dest: /var/lib/warp-svc/retry_counter
        content: "0\n"
        owner: root
        group: root
        mode: "0644"
        force: false

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start warp-svc stub
      ansible.builtin.systemd_service:
        name: warp-svc.service
        enabled: true
        state: started

  roles:
    - role: warp-outbound
