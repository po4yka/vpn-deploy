---
# Verify warp-outbound molecule scenario.
# Asserts:
#   1. warp-svc unit file present at expected path with correct ExecStart line.
#   2. Fallback retry counter file exists at expected path.
#   3. Synthetic failure: bump the counter and assert it increments.

- name: Verify warp-outbound role
  hosts: all
  become: true
  tasks:
    - name: warp-svc unit file is present
      ansible.builtin.stat:
        path: /etc/systemd/system/warp-svc.service
      register: warp_unit
      failed_when: not warp_unit.stat.exists

    - name: warp-svc unit has expected ExecStart entry
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q 'ExecStart=' /etc/systemd/system/warp-svc.service
        executable: /bin/bash
      changed_when: false

    - name: warp-svc unit references the retry counter env var
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q 'WARP_RETRY_COUNTER_FILE' /etc/systemd/system/warp-svc.service
        executable: /bin/bash
      changed_when: false

    - name: Fallback retry counter file exists
      ansible.builtin.stat:
        path: /var/lib/warp-svc/retry_counter
      register: retry_file
      failed_when: not retry_file.stat.exists

    - name: Read current retry counter value
      ansible.builtin.slurp:
        src: /var/lib/warp-svc/retry_counter
      register: counter_before_raw

    - name: Parse counter before synthetic failure
      ansible.builtin.set_fact:
        counter_before: "{{ (counter_before_raw.content | b64decode).strip() | int }}"

    # Failure-injection pattern from watchdog/molecule/failure/:
    # trigger a non-routable address attempt to simulate a WARP outage,
    # then increment the retry counter as the production handler would.
    - name: Simulate WARP fallback failure (curl non-routable address)
      ansible.builtin.command:
        cmd: >-
          curl --max-time 1 --socks5-hostname 127.0.0.1:40000
          http://192.0.2.1/nonexistent
      register: warp_fail_attempt
      changed_when: false
      failed_when: false

    - name: Increment retry counter (simulates production retry handler)
      ansible.builtin.shell:
        cmd: |
          count=$(cat /var/lib/warp-svc/retry_counter 2>/dev/null || echo 0)
          echo $(( count + 1 )) > /var/lib/warp-svc/retry_counter
        executable: /bin/sh
      changed_when: true

    - name: Read counter after synthetic failure
      ansible.builtin.slurp:
        src: /var/lib/warp-svc/retry_counter
      register: counter_after_raw

    - name: Parse counter after synthetic failure
      ansible.builtin.set_fact:
        counter_after: "{{ (counter_after_raw.content | b64decode).strip() | int }}"

    - name: Assert retry counter incremented
      ansible.builtin.assert:
        that:
          - counter_after | int > counter_before | int
        success_msg: "Retry counter incremented: {{ counter_before }} -> {{ counter_after }}"
        fail_msg: >-
          Retry counter did not increment.
          before={{ counter_before }} after={{ counter_after }}

    - name: warp-cli stub was invoked (call log exists)
      ansible.builtin.stat:
        path: /tmp/warp-cli-calls.log
      register: warp_call_log
      failed_when: not warp_call_log.stat.exists
