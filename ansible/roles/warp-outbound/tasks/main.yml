---
# Install + register Cloudflare WARP CLI in proxy mode on the VPS so the
# host can egress through Cloudflare's network. See the role README
# (ansible/roles/warp-outbound/defaults/main.yml) for rationale. The
# heavy lifting is the CLI install; registration is idempotent.

- name: Ensure HTTPS apt transport is available
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: warp_outbound.install_warp_cli | default(true)

- name: Install Cloudflare WARP GPG key
  ansible.builtin.get_url:
    url: https://pkg.cloudflareclient.com/pubkey.gpg
    dest: /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
    mode: "0644"
    force: false
  when: warp_outbound.install_warp_cli | default(true)

- name: Add Cloudflare WARP apt source
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/cloudflare-warp.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ {{ ansible_distribution_release }} main
  when: warp_outbound.install_warp_cli | default(true)

- name: Install cloudflare-warp package
  ansible.builtin.apt:
    name: cloudflare-warp
    state: present
    update_cache: true
  when: warp_outbound.install_warp_cli | default(true)

- name: Accept WARP terms (idempotent)
  ansible.builtin.command: warp-cli --accept-tos registration new
  register: warp_register
  changed_when: "'Success' in warp_register.stdout or warp_register.rc == 0"
  failed_when:
    - warp_register.rc != 0
    - "'already registered' not in warp_register.stdout"
    - "'already registered' not in warp_register.stderr"

- name: Set WARP proxy mode
  ansible.builtin.command: "warp-cli --accept-tos mode {{ warp_outbound.mode }}"
  when: warp_outbound.mode | default('proxy') == 'proxy'
  register: warp_mode
  changed_when: "'Success' in warp_mode.stdout"
  failed_when:
    - warp_mode.rc != 0
    - "'already' not in warp_mode.stdout"

- name: Set WARP proxy port
  ansible.builtin.command: "warp-cli --accept-tos proxy port {{ warp_outbound.socks_port }}"
  when: warp_outbound.mode | default('proxy') == 'proxy'
  register: warp_port
  changed_when: "'Success' in warp_port.stdout"
  failed_when:
    - warp_port.rc != 0
    - "'already' not in warp_port.stdout"

- name: Connect WARP
  ansible.builtin.command: warp-cli --accept-tos connect
  register: warp_connect
  changed_when: "'Success' in warp_connect.stdout"
  failed_when:
    - warp_connect.rc != 0
    - "'already' not in warp_connect.stdout"
    - "'Connected' not in warp_connect.stdout"

- name: Verify WARP exit IP is reachable
  ansible.builtin.command: "curl -fsS --max-time 10 --socks5-hostname 127.0.0.1:{{ warp_outbound.socks_port }} https://www.cloudflare.com/cdn-cgi/trace"
  register: warp_trace
  changed_when: false
  failed_when:
    - warp_trace.rc != 0
    - "'warp=on' not in warp_trace.stdout"