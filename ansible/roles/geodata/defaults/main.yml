---
# Pinned geodata for Xray. Operators must supply concrete release URLs and
# SHA256 checksums; the role refuses moving `latest` URLs and empty checksums.
#
# Example source families operators may pin to specific releases:
#   - https://github.com/v2fly/domain-list-community/releases
#   - https://github.com/v2fly/geoip/releases
#   - https://github.com/runetfreedom/russia-v2ray-rules-dat/releases

geodata:
  geosite_url: ""
  geoip_url: ""
  geosite_sha256: ""
  geoip_sha256: ""
  install_dir: /usr/local/share/xray
  refresh_interval: "1d"
