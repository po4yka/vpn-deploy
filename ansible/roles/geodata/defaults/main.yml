---
# Pinned geodata for Xray. Override by setting `geodata.*` keys in secrets
# (or in group_vars). Defaults track v2fly community packs.
#
# RU-aware alternatives operators may prefer:
#   geosite_url: https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat
#   geoip_url:   https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat

geodata:
  geosite_url: "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat"
  geoip_url:   "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat"
  # Pin SHA256 for reproducibility. Leave empty to skip checksum verification
  # (NOT recommended for production).
  geosite_sha256: ""
  geoip_sha256:   ""
  install_dir: /usr/local/share/xray
  refresh_interval: "1d"
