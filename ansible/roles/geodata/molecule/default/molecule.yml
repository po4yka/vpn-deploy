---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: vpn-geodata-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../..
  inventory:
    host_vars:
      vpn-geodata-debian13:
        ansible_user: root
  config_options:
    defaults:
      callback_result_format: yaml

verifier:
  name: ansible

# Skip the converge step: the role downloads pinned URLs that the CI
# runner shouldn't pull on every PR. syntax + create + destroy still
# exercises the role file structure and idempotence of task defs.
scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - destroy
