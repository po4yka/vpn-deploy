---
# Pinned geodata refresher. Hot-reloads Xray via SIGHUP on Xray v26.4.x+;
# older versions silently no-op the reload (operators on older Xray
# should disable this role).

- name: Pre-flight - geodata sources are pinned
  ansible.builtin.assert:
    that:
      - geodata.geosite_url | length > 0
      - geodata.geoip_url | length > 0
      - "'/latest/' not in geodata.geosite_url"
      - "'/latest/' not in geodata.geoip_url"
      - geodata.geosite_sha256 is match('^[0-9a-fA-F]{64}$')
      - geodata.geoip_sha256 is match('^[0-9a-fA-F]{64}$')
    fail_msg: |
      geodata requires pinned release URLs and SHA256 checksums. Set
      geodata.geosite_url, geodata.geosite_sha256, geodata.geoip_url, and
      geodata.geoip_sha256 to concrete release artifacts before enabling
      vpn.enable_geodata.

- name: Ensure geodata install directory
  ansible.builtin.file:
    path: "{{ geodata.install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download geosite.dat
  ansible.builtin.get_url:
    url: "{{ geodata.geosite_url }}"
    dest: "{{ geodata.install_dir }}/geosite.dat"
    mode: "0644"
    checksum: "sha256:{{ geodata.geosite_sha256 }}"
    force: true
  notify: Reload xray geodata

- name: Download geoip.dat
  ansible.builtin.get_url:
    url: "{{ geodata.geoip_url }}"
    dest: "{{ geodata.install_dir }}/geoip.dat"
    mode: "0644"
    checksum: "sha256:{{ geodata.geoip_sha256 }}"
    force: true
  notify: Reload xray geodata

- name: Drop refresh script
  ansible.builtin.template:
    src: vpn-geodata-refresh.sh.j2
    dest: /usr/local/sbin/vpn-geodata-refresh.sh
    owner: root
    group: root
    mode: "0750"

- name: Drop refresh systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/vpn-geodata-refresh.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Refresh Xray geodata
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/vpn-geodata-refresh.sh

- name: Drop refresh systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/vpn-geodata-refresh.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Refresh Xray geodata daily

      [Timer]
      OnCalendar=*-*-* 04:00:00
      RandomizedDelaySec=30m
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable refresh timer
  ansible.builtin.systemd_service:
    name: vpn-geodata-refresh.timer
    enabled: true
    state: started
    daemon_reload: true
