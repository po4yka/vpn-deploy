---
- name: Verify xray role
  hosts: all
  become: true
  tasks:
    - name: /etc/xray/config.json exists
      ansible.builtin.stat:
        path: /etc/xray/config.json
      register: cfg
      failed_when: not cfg.stat.exists

    - name: /etc/xray/config.json owned by root:xray with 0640
      ansible.builtin.assert:
        that:
          - cfg.stat.pw_name == "root"
          - cfg.stat.gr_name == "xray"
          - cfg.stat.mode == "0640"

    - name: config.json contains expected REALITY structure
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q '"protocol": "vless"' /etc/xray/config.json
          grep -q '"security": "reality"' /etc/xray/config.json
          grep -q '"flow": "xtls-rprx-vision"' /etc/xray/config.json
        executable: /bin/bash
      changed_when: false

    - name: systemd unit installed
      ansible.builtin.stat:
        path: /etc/systemd/system/xray.service
      register: unit
      failed_when: not unit.stat.exists

    - name: /opt/xray/current symlink points at the pinned release
      ansible.builtin.stat:
        path: /opt/xray/current
      register: link
      failed_when: not link.stat.islnk or 'v26.3.27' not in link.stat.lnk_target

    # State-level: the stubbed xray binary sleeps in `run` mode, so the
    # unit should reach `active (running)`. If the role's restart handler
    # ever silently swallows a start failure, this catches it.
    - name: xray.service is active
      ansible.builtin.command:
        cmd: systemctl is-active xray.service
      register: xray_active
      changed_when: false
      failed_when: xray_active.stdout != "active"

    - name: xray.service journal has no fatal entries
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ! journalctl -u xray.service --since "5 minutes ago" \
            --no-pager --output=cat \
            | grep -iE 'traceback|fatal|panic|failed to'
        executable: /bin/bash
      changed_when: false

    - name: config.json is valid JSON
      ansible.builtin.shell:
        cmd: python3 -c "import json,sys; json.load(open('/etc/xray/config.json'))"
      changed_when: false

    - name: Read config.json for REALITY shortId assertions
      ansible.builtin.slurp:
        src: /etc/xray/config.json
      register: xray_config_raw

    - name: Parse config.json
      ansible.builtin.set_fact:
        xray_config: "{{ xray_config_raw.content | b64decode | from_json }}"

    - name: Extract REALITY shortIds from config (placeholders filtered out)
      ansible.builtin.set_fact:
        reality_short_ids: >-
          {{
            (xray_config.inbounds | default([]))
            | selectattr('streamSettings', 'defined')
            | map(attribute='streamSettings')
            | selectattr('realitySettings', 'defined')
            | map(attribute='realitySettings')
            | map(attribute='shortIds', default=[])
            | flatten
            | reject('match', '^REPLACE_')
            | list
          }}

    - name: All real REALITY shortIds have even length (odd length breaks sing-box <= 1.10)
      # Stub fixtures render REPLACE_WITH_8HEX placeholders; the filter
      # above drops those so the check exercises only real shortIds (which
      # only exist when secrets are populated). When the list is empty,
      # nothing is asserted — production secrets get the full check.
      ansible.builtin.assert:
        that:
          - (reality_short_ids | length) == 0 or
            (reality_short_ids | map('length') | select('odd') | list | length) == 0
        fail_msg: >-
          REALITY shortIds must all have even length. Odd-length IDs:
          {{ reality_short_ids | rejectattr('__len__', 'even') | list }}
