---
- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true

# Notify topic: "Restart xray" — three steps run in order via `listen`.
# Handlers cannot use block/rescue, so the bad-config rollback used to live
# here lives upstream now: tasks/main.yml validates the rendered config via
# `xray run -test` before writing it, so we never ship a broken config to
# the restart path.

- name: Test Xray config before restart
  ansible.builtin.command:
    cmd: /usr/local/bin/xray run -test -config {{ xray_etc_dir }}/config.json
  changed_when: false
  listen: Restart xray

- name: Restart Xray
  ansible.builtin.systemd_service:
    name: xray
    state: restarted
  listen: Restart xray

- name: Wait for Xray service to become active
  ansible.builtin.command:
    cmd: systemctl is-active xray
  register: xray_active
  retries: 5
  delay: 2
  until: xray_active.stdout == "active"
  changed_when: false
  listen: Restart xray
