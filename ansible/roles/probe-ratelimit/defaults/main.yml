---
# Active-probing rate-limiter. Tails the Xray access log on the VPS,
# counts REJECT events per source IP, and adds offenders to an nftables
# set with a TTL. The firewall role wires the set into the input chain
# as an early drop when vpn.enable_probe_ratelimit is true.
#
# Off by default. Tune thresholds based on the cohort's normal probe
# rate — too aggressive and you ban legit clients whose first attempt
# was REJECTed by REALITY's graylist; too lax and TSPU's active-probing
# wave hits the real listener before the set absorbs it.

probe_ratelimit:
  # how many REJECTs from one IP within window_seconds trigger a ban
  rejects_per_window: 5
  window_seconds: 60
  # how long the IP stays in the offenders set (nftables timeout)
  ban_seconds: 300
  # textfile output for graphing
  textfile_dir: /var/lib/node_exporter/textfile