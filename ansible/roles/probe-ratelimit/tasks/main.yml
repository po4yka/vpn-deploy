---
# Active-probing rate-limiter daemon. Requires the firewall role's
# `probe_offenders` set to exist (firewall template gates it on
# vpn.enable_probe_ratelimit). The site.yml ordering ensures firewall
# runs first.

- name: Install daemon script
  ansible.builtin.template:
    src: probe-ratelimit.py.j2
    dest: /usr/local/bin/probe-ratelimit.py
    owner: root
    group: root
    mode: "0755"
  notify: Restart probe-ratelimit

- name: Install systemd unit
  ansible.builtin.template:
    src: probe-ratelimit.service.j2
    dest: /etc/systemd/system/probe-ratelimit.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart probe-ratelimit

- name: Enable + start probe-ratelimit
  ansible.builtin.systemd_service:
    name: probe-ratelimit.service
    enabled: true
    state: started
    daemon_reload: true