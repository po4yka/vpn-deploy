---
# Local-first restic repository, with optional remote sync via rclone.
# Remote sync is gated by `backup.remote.enabled`; when off, this role
# only writes a local repository under `restic_repo_dir`.

- name: Install restic
  ansible.builtin.apt:
    name:
      - restic
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install rclone (remote sync only)
  ansible.builtin.apt:
    name:
      - rclone
    state: present
  when: backup.remote.enabled | default(false)

- name: Ensure restic repo directory
  ansible.builtin.file:
    path: "{{ restic_repo_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Drop restic password file
  ansible.builtin.copy:
    content: "{{ backup.restic_password }}"
    dest: /etc/restic/password
    owner: root
    group: root
    mode: "0600"
  no_log: true
  diff: false

- name: Initialize restic repo if missing
  ansible.builtin.command:
    cmd: restic -r {{ restic_repo_dir }} --password-file /etc/restic/password init
    creates: "{{ restic_repo_dir }}/config"
  register: restic_init
  changed_when: "'created restic repository' in (restic_init.stderr | default('')) or 'created restic repository' in (restic_init.stdout | default(''))"

- name: Ensure rclone config directory
  ansible.builtin.file:
    path: /etc/rclone
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: backup.remote.enabled | default(false)

- name: Drop rclone config (full content from secrets)
  ansible.builtin.copy:
    content: "{{ backup.remote.rclone_config }}"
    dest: /etc/rclone/rclone.conf
    owner: root
    group: root
    mode: "0600"
  no_log: true
  diff: false
  when: backup.remote.enabled | default(false)

- name: Render backup script
  ansible.builtin.template:
    src: vpn-backup.sh.j2
    dest: /usr/local/sbin/vpn-backup.sh
    owner: root
    group: root
    mode: "0750"

- name: Drop backup systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/vpn-backup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=VPN config backup (restic, optional rclone sync)
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/vpn-backup.sh
      Nice=10
      IOSchedulingClass=best-effort
      IOSchedulingPriority=7

- name: Drop backup systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/vpn-backup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run VPN config backup daily

      [Timer]
      OnCalendar=*-*-* 03:30:00
      RandomizedDelaySec=15m
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable backup timer
  ansible.builtin.systemd_service:
    name: vpn-backup.timer
    enabled: true
    state: started
    daemon_reload: true
