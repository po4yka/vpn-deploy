---
- name: Converge watchdog role
  hosts: all
  become: true
  vars:
    xray_log_dir: /var/log/xray
    vpn:
      enable_xray_reality: true
      enable_nginx_xhttp: true
      enable_hysteria: false
      enable_amneziawg: false
    amneziawg:
      interface: awg0
    xray_port: 443
    hysteria_port: 443
    watchdog_secrets:
      ntfy_topic: "molecule-stub-topic"
  roles:
    - role: watchdog
