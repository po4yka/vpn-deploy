---
- name: Verify alert path fires when xray is missing
  hosts: all
  become: true
  tasks:
    # Trigger a probe immediately instead of waiting on the 5-min timer.
    - name: Run vpn-watchdog.sh once with the env file loaded
      ansible.builtin.shell:
        cmd: |
          set -a
          . /etc/vpn-watchdog.env
          set +a
          /usr/local/sbin/vpn-watchdog.sh
        executable: /bin/bash
      changed_when: false

    # Give the stub listener a moment to finish writing.
    - name: Wait for the stub to flush the captured alert
      ansible.builtin.wait_for:
        path: /tmp/ntfy-stub.log
        search_regex: '"title":'
        timeout: 10

    - name: Read the captured alerts
      ansible.builtin.slurp:
        src: /tmp/ntfy-stub.log
      register: alert_blob

    - name: Decode + assert alert shape
      vars:
        records: >-
          {{
            (alert_blob.content | b64decode).splitlines()
            | map('from_json') | list
          }}
      ansible.builtin.assert:
        that:
          - records | length >= 1
          - records[0].title is search('VPN\[')
          - records[0].title is search('failing')
          - records[0].tags is search('warning')
          - records[0].body is search('xray.service active')
        success_msg: |
          alert dispatched: {{ records[0].title }}
        fail_msg: |
          watchdog did not push the expected alert.
          records={{ records }}

    - name: state file reflects the consecutive failure
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -q '^consecutive_fails=[1-9]' /var/lib/vpn-watchdog/state
        executable: /bin/bash
      changed_when: false

    - name: vpn-watchdog journal contains the "failing:" summary
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          journalctl -u vpn-watchdog.service --since "5 minutes ago" \
            --no-pager --output=cat \
            | grep -q 'consecutive_fails='
        executable: /bin/bash
      changed_when: false
      # The probe ran above directly from the verify (not via the timer),
      # so the journal entry may not include it. Mark the task as a soft
      # signal — its absence isn't a fail on its own; the title-shape
      # assertion above is the load-bearing check.
      failed_when: false
