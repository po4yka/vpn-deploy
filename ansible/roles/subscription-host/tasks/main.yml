---
# Subscription delivery host. nginx fronts TLS + rate-limit; the local
# vpn-bootstrap Python service handles both /sub/<token> (long-lived)
# and /bootstrap/<token> (single-use), with hashed-on-disk storage,
# per-token expiry, revocation, and an audit log of every read.

- name: Ensure nginx is present
  ansible.builtin.apt:
    name:
      - nginx
    state: present

# ---------------------------------------------------------------------------
# nginx layer (TLS + rate-limit only).
# ---------------------------------------------------------------------------

- name: Drop rate-limit zone (http-level)
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/vpn-sub-ratelimit.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Per-IP rate limit zone for the subscription host.
      # zone size 10m holds ~160k state entries; rate {{ subscription.rate_limit | default('5r/m') }}.
      limit_req_zone $binary_remote_addr zone=vpn_sub_per_ip:10m rate={{ subscription.rate_limit | default('5r/m') }};
  notify: Reload nginx

- name: Remove legacy revoked-tokens nginx map (revocation lives in the Python service)
  ansible.builtin.file:
    path: /etc/nginx/conf.d/vpn-sub-revoked.conf
    state: absent
  notify: Reload nginx

- name: Drop subscription site
  ansible.builtin.template:
    src: subscription.conf.j2
    dest: /etc/nginx/sites-available/vpn-sub.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable subscription site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/vpn-sub.conf
    dest: /etc/nginx/sites-enabled/vpn-sub.conf
    state: link
    force: true
  notify: Reload nginx

- name: Validate the full nginx config
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false

# ---------------------------------------------------------------------------
# vpn-bootstrap Python service — always installed when this role runs.
# Handles /sub/ AND /bootstrap/ behind hashed-on-disk storage.
# ---------------------------------------------------------------------------

- name: Ensure system user
  ansible.builtin.user:
    name: vpn-bootstrap
    system: true
    shell: /usr/sbin/nologin
    home: "{{ subscription.subscription_dir | default('/var/lib/vpn-subscription') }}"
    create_home: false

- name: Ensure subscription dir + per-route subdirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: vpn-bootstrap
    group: vpn-bootstrap
    mode: "0700"
  loop:
    - "{{ subscription.subscription_dir | default('/var/lib/vpn-subscription') }}"
    - "{{ subscription.subscription_dir | default('/var/lib/vpn-subscription') }}/sub"
    - "{{ subscription.subscription_dir | default('/var/lib/vpn-subscription') }}/bootstrap"

- name: Ensure reads-log directory
  ansible.builtin.file:
    path: "{{ subscription.reads_log | default('/var/log/vpn-subscription/reads.log') | dirname }}"
    state: directory
    owner: vpn-bootstrap
    group: vpn-bootstrap
    mode: "0750"

- name: Render revoked-hashes file
  ansible.builtin.copy:
    dest: "{{ subscription.revoked_file | default('/var/lib/vpn-subscription/revoked') }}"
    owner: vpn-bootstrap
    group: vpn-bootstrap
    mode: "0600"
    content: |
      # Managed by Ansible role subscription-host. One sha256 hex per line.
      # The Python service re-reads this file on every request.
      {% for h in subscription.revoked_token_hashes | default([]) %}
      {{ h }}
      {% endfor %}
  no_log: true
  diff: false

- name: Install service script
  ansible.builtin.template:
    src: vpn-bootstrap.py.j2
    dest: /usr/local/bin/vpn-bootstrap.py
    owner: root
    group: root
    mode: "0755"
  notify: Restart vpn-bootstrap

- name: Install systemd unit
  ansible.builtin.template:
    src: vpn-bootstrap.service.j2
    dest: /etc/systemd/system/vpn-bootstrap.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart vpn-bootstrap

- name: Enable + start service
  ansible.builtin.systemd_service:
    name: vpn-bootstrap.service
    enabled: true
    state: started
    daemon_reload: true
