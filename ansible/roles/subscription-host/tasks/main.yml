---
# Subscription delivery: separate nginx server block, payload files at
# /var/lib/vpn-sub/<token>, plus
#   * revocation list — revoked tokens get HTTP 410 Gone instead of the file
#   * per-IP rate limiting (nginx limit_req)
#   * no access logs on the subscription host (privacy)

- name: Ensure nginx is present
  ansible.builtin.apt:
    name:
      - nginx
    state: present

- name: Ensure subscription payload directory
  ansible.builtin.file:
    path: /var/lib/vpn-sub
    state: directory
    owner: root
    group: www-data
    mode: "0750"

- name: Drop revoked-token map (read by nginx)
  # `template.validate` would need to call `nginx -t -c %s` on a single
  # `map …` snippet, which fails outside the http {} context. Render
  # plainly and validate the full config below.
  ansible.builtin.template:
    src: revoked-tokens.map.j2
    # Debian's default nginx.conf includes /etc/nginx/conf.d/*.conf only,
    # so the map snippet must use a .conf extension to be loaded.
    dest: /etc/nginx/conf.d/vpn-sub-revoked.conf
    owner: root
    group: root
    mode: "0644"
  no_log: true
  diff: false
  notify: Reload nginx

- name: Drop rate-limit zone (http-level)
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/vpn-sub-ratelimit.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Per-IP rate limit zone for the subscription host.
      # zone size 10m holds ~160k state entries; rate {{ subscription.rate_limit | default('5r/m') }}.
      limit_req_zone $binary_remote_addr zone=vpn_sub_per_ip:10m rate={{ subscription.rate_limit | default('5r/m') }};
  notify: Reload nginx

- name: Drop subscription site
  ansible.builtin.template:
    src: subscription.conf.j2
    dest: /etc/nginx/sites-available/vpn-sub.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable subscription site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/vpn-sub.conf
    dest: /etc/nginx/sites-enabled/vpn-sub.conf
    state: link
    force: true
  notify: Reload nginx

- name: Validate the full nginx config now the subscription site is enabled
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false

# ---------------------------------------------------------------------------
# One-time bootstrap token server (optional, off by default).
# ---------------------------------------------------------------------------
- name: Bootstrap — ensure system user
  ansible.builtin.user:
    name: vpn-bootstrap
    system: true
    shell: /usr/sbin/nologin
    home: "{{ subscription.bootstrap_dir | default('/var/lib/vpn-bootstrap') }}"
    create_home: false
  when: subscription.enable_bootstrap | default(false)

- name: Bootstrap — payload directory
  ansible.builtin.file:
    path: "{{ subscription.bootstrap_dir | default('/var/lib/vpn-bootstrap') }}"
    state: directory
    owner: vpn-bootstrap
    group: vpn-bootstrap
    mode: "0700"
  when: subscription.enable_bootstrap | default(false)

- name: Bootstrap — install service script
  ansible.builtin.template:
    src: vpn-bootstrap.py.j2
    dest: /usr/local/bin/vpn-bootstrap.py
    owner: root
    group: root
    mode: "0755"
  when: subscription.enable_bootstrap | default(false)
  notify: Restart vpn-bootstrap

- name: Bootstrap — install systemd unit
  ansible.builtin.template:
    src: vpn-bootstrap.service.j2
    dest: /etc/systemd/system/vpn-bootstrap.service
    owner: root
    group: root
    mode: "0644"
  when: subscription.enable_bootstrap | default(false)
  notify: Restart vpn-bootstrap

- name: Bootstrap — enable + start service
  ansible.builtin.systemd_service:
    name: vpn-bootstrap.service
    enabled: true
    state: started
    daemon_reload: true
  when: subscription.enable_bootstrap | default(false)
