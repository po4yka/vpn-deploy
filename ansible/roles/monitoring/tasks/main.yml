---
# Local-first monitoring: node_exporter on a private port (firewall-restricted)
# and a small set of journald log rules. Remote scrape and alert routing are
# operator's choice and are not configured here.

- name: Install node_exporter from distro packages
  ansible.builtin.apt:
    name:
      - prometheus-node-exporter
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure node_exporter listen address (loopback only by default)
  ansible.builtin.copy:
    dest: /etc/default/prometheus-node-exporter
    owner: root
    group: root
    mode: "0644"
    content: |
      ARGS="--web.listen-address={{ monitoring.node_exporter_listen | default('127.0.0.1:9100') }} \
            --collector.systemd \
            --collector.processes \
            --no-collector.wifi"
  notify: Restart node_exporter

- name: Ensure node_exporter enabled
  ansible.builtin.systemd_service:
    name: prometheus-node-exporter
    enabled: true
    state: started

- name: Ensure journald drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Drop journald hardening config
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/vpn.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Journal]
      Storage=persistent
      SystemMaxUse=500M
      MaxRetentionSec=14day
      ForwardToSyslog=no
  notify: Restart journald

- name: Drop logrotate config for xray
  ansible.builtin.copy:
    dest: /etc/logrotate.d/xray
    owner: root
    group: root
    mode: "0644"
    content: |
      {{ xray_log_dir }}/*.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
          create 0640 xray xray
          sharedscripts
          postrotate
              systemctl kill -s HUP xray.service 2>/dev/null || true
          endscript
      }
  when: vpn.enable_xray_reality | default(true)

- name: Drop logrotate config for nginx
  ansible.builtin.copy:
    dest: /etc/logrotate.d/nginx-vpn
    owner: root
    group: root
    mode: "0644"
    content: |
      /var/log/nginx/vpn-*.log {
          daily
          rotate 14
          compress
          missingok
          notifempty
          create 0640 www-data adm
          sharedscripts
          postrotate
              systemctl reload nginx 2>/dev/null || true
          endscript
      }
  when: vpn.enable_nginx_xhttp | default(true)
