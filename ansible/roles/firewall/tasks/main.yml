---
# OS-level firewall: declarative nftables, validate-before-reload.
# Hypervisor firewall (provider-specific) is the outer layer; this is
# the inner layer co-located with the workload.

- name: Render nftables config
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: Ensure nftables service is enabled and started
  ansible.builtin.systemd_service:
    name: nftables
    enabled: true
    state: started
