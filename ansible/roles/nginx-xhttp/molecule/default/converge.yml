---
- name: Converge nginx-xhttp role
  hosts: all
  become: true
  vars:
    nginx_xhttp_port: 8443
    xray:
      xhttp_path: "/app-sync"
    nginx_xhttp:
      server_name: vpn.example.test
      cert_pem: |
        -----BEGIN CERTIFICATE-----
        STUB_CERT_FOR_MOLECULE
        -----END CERTIFICATE-----
      key_pem: |
        -----BEGIN PRIVATE KEY-----
        STUB_KEY_FOR_MOLECULE
        -----END PRIVATE KEY-----
  pre_tasks:
    - name: Generate a real self-signed cert/key so nginx -t passes
      ansible.builtin.command:
        cmd: |
          openssl req -x509 -newkey rsa:2048 -nodes
            -keyout /tmp/molecule.key
            -out /tmp/molecule.crt
            -subj /CN=vpn.example.test
            -days 1
        creates: /tmp/molecule.crt
    - name: Read the cert
      ansible.builtin.slurp:
        src: /tmp/molecule.crt
      register: stub_cert
    - name: Read the key
      ansible.builtin.slurp:
        src: /tmp/molecule.key
      register: stub_key
    - name: Override the role's cert/key with the molecule-generated pair
      ansible.builtin.set_fact:
        nginx_xhttp:
          server_name: vpn.example.test
          cert_pem: "{{ stub_cert.content | b64decode }}"
          key_pem: "{{ stub_key.content | b64decode }}"
  roles:
    - role: nginx-xhttp
