---
# Active-probing canary. See defaults/main.yml for rationale.

- name: Ensure system user
  ansible.builtin.user:
    name: honeypot
    system: true
    shell: /usr/sbin/nologin
    home: "{{ honeypot.log_dir }}"
    create_home: false

- name: Ensure log + textfile directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: honeypot
    group: honeypot
    mode: "0750"
  loop:
    - "{{ honeypot.log_dir }}"
    - "{{ honeypot.textfile_dir }}"

- name: Install honeypot listener
  ansible.builtin.template:
    src: honeypot.py.j2
    dest: /usr/local/bin/honeypot.py
    owner: root
    group: root
    mode: "0755"
  notify: Restart honeypot

- name: Install systemd unit
  ansible.builtin.template:
    src: honeypot.service.j2
    dest: /etc/systemd/system/honeypot.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart honeypot

- name: Enable + start honeypot
  ansible.builtin.systemd_service:
    name: honeypot.service
    enabled: true
    state: started
    daemon_reload: true