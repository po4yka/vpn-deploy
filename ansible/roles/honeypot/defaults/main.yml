---
# Active-probing canary. Opens a TCP port that accepts any connection,
# reads the first up-to-512 bytes (the TLS ClientHello when the probe
# is HTTPS-shaped), logs source IP / SNI / timestamp, then closes.
#
# Value-add depends on topology:
#   * Same IP as real REALITY listener — observes scanners that
#     enumerate ports on suspicious IPs. Useful but partial.
#   * Separate IP (UpCloud floating IP, etc.) — observes TSPU's own
#     IP-discovery probes. Strongly recommended; default is same-IP
#     because that's what the v1 single-VPS deploy supports.
#
# Off by default (vpn.enable_honeypot in group_vars/all.yml). Opt in
# explicitly and pick a port that doesn't collide with REALITY/XHTTP/
# Hysteria.

honeypot:
  port: 4443
  log_dir: /var/log/honeypot
  textfile_dir: /var/lib/node_exporter/textfile
  # Sample rate cap — if probes start hammering us, only record up to
  # this many events per minute. Avoids disk-filling DoS via probe
  # storm; the per-minute COUNT still updates every event.
  events_per_minute_max: 1000
  # Listen address. "0.0.0.0" = every public IP on the host (the v1
  # default; the canary co-locates with REALITY and catches port
  # scans). Set `additional_public_ip = true` in the UpCloud tfvars
  # to allocate a secondary public IPv4; render-inventory.sh surfaces
  # it as the host_var `honeypot_listen_addr`, which the default
  # below picks up so the canary binds to the dedicated address.
  listen_addr: "{{ honeypot_listen_addr | default('0.0.0.0') }}"