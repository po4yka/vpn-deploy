---
# P2 device-VPN transport: AmneziaWG userspace install on Debian 13 / Ubuntu 24.04.
#
# Userspace path is preferred for portability across kernels. The kernel module
# variant ships separately and is not assumed here.

- name: Pre-flight - AmneziaWG source refs are pinned
  ansible.builtin.assert:
    that:
      - amneziawg_go_version | length > 0
      - amneziawg_tools_version | length > 0
      - (amneziawg_go_version | lower) not in ['main', 'master', 'head']
      - (amneziawg_tools_version | lower) not in ['main', 'master', 'head']
    fail_msg: |
      Set amneziawg_go_version and amneziawg_tools_version to pinned upstream
      tags or commit SHAs. The role does not clone moving branches such as
      main, master, or HEAD.

- name: Install build dependencies for AmneziaWG userspace
  ansible.builtin.apt:
    name:
      - golang
      - git
      - make
      - libmnl-dev
      - resolvconf
      - iproute2
      - iptables
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Clone amneziawg-go
  ansible.builtin.git:
    repo: https://github.com/amnezia-vpn/amneziawg-go
    dest: /opt/src/amneziawg-go
    version: "{{ amneziawg_go_version }}"
    update: false

- name: Build amneziawg-go
  ansible.builtin.command:
    cmd: make
    chdir: /opt/src/amneziawg-go
    creates: /opt/src/amneziawg-go/amneziawg-go

- name: Install amneziawg-go binary
  ansible.builtin.copy:
    src: /opt/src/amneziawg-go/amneziawg-go
    dest: /usr/local/bin/amneziawg-go
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Clone amneziawg-tools
  ansible.builtin.git:
    repo: https://github.com/amnezia-vpn/amneziawg-tools
    dest: /opt/src/amneziawg-tools
    version: "{{ amneziawg_tools_version }}"
    update: false

- name: Build amneziawg-tools
  ansible.builtin.command:
    cmd: make
    chdir: /opt/src/amneziawg-tools/src
    creates: /opt/src/amneziawg-tools/src/awg

- name: Install amneziawg-tools
  ansible.builtin.command:
    cmd: make install
    chdir: /opt/src/amneziawg-tools/src
  args:
    creates: /usr/bin/awg

- name: Ensure AmneziaWG config directory
  ansible.builtin.file:
    path: "{{ amneziawg_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Compute effective AmneziaWG instances
  ansible.builtin.set_fact:
    _awg_instances: >-
      {{ (amneziawg_secrets.instances | default([])) if
         (amneziawg_secrets.instances | default([])) | length > 0
         else [{
           'name': amneziawg.interface,
           'listen_port': amneziawg.listen_port,
           'address_v4': amneziawg.address_v4,
           'address_v6': amneziawg.address_v6,
           'server_private_key': amneziawg_secrets.server_private_key,
           'jc':   amneziawg_secrets.jc   | default(4),
           'jmin': amneziawg_secrets.jmin | default(40),
           'jmax': amneziawg_secrets.jmax | default(70),
           's1':   amneziawg_secrets.s1   | default(50),
           's2':   amneziawg_secrets.s2   | default(100),
           'h1':   amneziawg_secrets.h1,
           'h2':   amneziawg_secrets.h2,
           'h3':   amneziawg_secrets.h3,
           'h4':   amneziawg_secrets.h4,
           'peers': amneziawg_secrets.peers,
         }] }}

- name: Install awg-quick systemd unit (shared across instances)
  ansible.builtin.template:
    src: awg-quick@.service.j2
    dest: /etc/systemd/system/awg-quick@.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Render AmneziaWG interface configs
  ansible.builtin.template:
    src: awg0.conf.j2
    dest: "{{ amneziawg_config_dir }}/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  diff: false
  loop: "{{ _awg_instances }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    _inst: "{{ item }}"
  notify: Reload amneziawg

- name: Enable and start awg-quick@<iface> for every instance
  ansible.builtin.systemd_service:
    name: "awg-quick@{{ item.name }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ _awg_instances }}"
  loop_control:
    label: "{{ item.name }}"
