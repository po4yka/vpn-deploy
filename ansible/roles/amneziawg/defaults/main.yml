---
# AmneziaWG runtime defaults. Override in group_vars or playbook vars if needed.

amneziawg_go_version: ""
amneziawg_tools_version: ""

# Optional supply-chain hardening. git tags are mutable — upstream can
# re-point them. When a commit SHA is set here, the role runs
# `git rev-parse HEAD` after clone and refuses to build if the tag has
# moved off the expected commit. Leave empty to keep tag-only pinning.
amneziawg_go_commit: ""
amneziawg_tools_commit: ""

amneziawg:
  listen_port: 51820
  interface: awg0
  address_v4: "10.66.66.1/24"
  address_v6: "fd42:42:42::1/64"
  dns_servers:
    - "1.1.1.1"
    - "1.0.0.1"
