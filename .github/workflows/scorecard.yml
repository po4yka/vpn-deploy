---
name: scorecard
on:
  branch_protection_rule:
  schedule:
    - cron: '0 5 * * 1'   # Monday 05:00 UTC
  push:
    branches: [main]

# Permissions follow the official OSSF Scorecard template +
# workflow-restrictions:
#   https://github.com/ossf/scorecard-action#installation
#   https://github.com/ossf/scorecard-action#workflow-restrictions
# Top-level MUST be read-only — Scorecard's publishing webapp rejects
# results from workflows that have any global write permission
# ("workflow verification failed: global perm is set to write").
# Write scopes are at job level only.
permissions:
  contents: read
  actions: read

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-24.04
    # OSSF Scorecard targets public OSS supply-chain trust. On private repos
    # GITHUB_TOKEN's graphql scope can't run the queries Scorecard expects
    # (`ListCommits` returns "Resource not accessible by integration") and
    # the public registry rejects publishes. Skip until the repo is public;
    # the workflow self-activates on that transition.
    if: ${{ github.event.repository.visibility == 'public' }}
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Public registry only accepts public-repo results; this job
          # already gates on visibility.
          publish_results: true
          # Optional: set SCORECARD_TOKEN for richer checks (BranchProtection,
          # Webhooks). Falls back to GITHUB_TOKEN when absent.
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload Scorecard results to code scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: results.sarif

      - name: Upload artifact (audit trail)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: SARIF
          path: results.sarif
          retention-days: 5
