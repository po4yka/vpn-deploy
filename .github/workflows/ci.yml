---
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Run gitleaks with repo rules
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITLEAKS_CONFIG: ./.gitleaks.toml
          GITLEAKS_NOTIFY_USER_LIST: ""
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "false"
          # gitleaks-action still ships Node 20 (no v3 yet); opt in to
          # Node 24 ahead of the June 2026 deprecation cutoff.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        provider: [upcloud, hetzner, vultr]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4
        with:
          terraform_version: "1.15.2"

      - name: terraform fmt -check
        working-directory: terraform/providers/${{ matrix.provider }}
        run: terraform fmt -check -recursive

      - name: terraform init -backend=false
        working-directory: terraform/providers/${{ matrix.provider }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform/providers/${{ matrix.provider }}
        run: terraform validate

  cloud-init:
    name: cloud-init schema
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install cloud-init
        run: |
          sudo apt-get update
          sudo apt-get install -y cloud-init

      - name: Render cloud-init template
        # The template only uses Terraform's `${var}` interpolation (no
        # %{ if } / for-each), so a 6-line Python render is enough — and
        # it avoids `terraform console` which has hung indefinitely on
        # heredoc stdin in this CI image.
        run: |
          python3 - <<'PY' > /tmp/cloud-init.rendered.yaml
          import re, pathlib
          tpl = pathlib.Path("terraform/shared/cloud-init.yaml.tftpl").read_text()
          vars = {
              "admin_user": "deploy",
              "admin_ssh_public_key":
                  "ssh-ed25519 AAAA_REPLACE_WITH_PUBLIC_KEY operator@laptop",
              "build_env": "ci",
          }
          print(re.sub(r"\$\{(\w+)\}", lambda m: vars[m.group(1)], tpl), end="")
          PY

      - name: Validate with cloud-init schema
        run: cloud-init schema --config-file /tmp/cloud-init.rendered.yaml

  ansible:
    name: ansible-lint + syntax-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install pinned tooling
        run: |
          pip install --require-hashes --no-deps -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: ansible-lint
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ./ansible.cfg
        run: ansible-lint --offline

      - name: ansible-playbook --syntax-check
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ./ansible.cfg
          # site.yml asserts VPN_SECRETS_FILE is set; provide a stub for syntax-check.
          VPN_SECRETS_FILE: ${{ github.workspace }}/secrets/prod.secrets.example.yaml
        run: ansible-playbook playbooks/site.yml --syntax-check -i 'localhost,'

  molecule:
    name: molecule (${{ matrix.role }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        role:
          - baseline
          - firewall
          - xray
          - hysteria
          - nginx-xhttp
          - watchdog
          - monitoring
          - backup
          - subscription-host
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install pinned tooling
        run: |
          pip install --require-hashes --no-deps -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: molecule test
        working-directory: ansible/roles/${{ matrix.role }}
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run shellcheck on every shell script
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -s bash -S warning scripts/*.sh

  secrets-coverage:
    name: secrets-coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --require-hashes --no-deps -r requirements.txt
      - name: check-secrets-coverage
        run: python3 scripts/check-secrets-coverage.py

  templates-render:
    name: templates-render
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install --require-hashes --no-deps -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y nginx-light
      - name: check-templates-render
        run: python3 scripts/check-templates-render.py

  yaml:
    name: yamllint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install --require-hashes --no-deps -r requirements.txt
      - name: yamllint
        run: yamllint -c .yamllint.yml .

  unit-tests:
    name: pytest unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install pinned tooling
        run: pip install --require-hashes --no-deps -r requirements.txt
      - name: pytest tests/unit/
        run: python3 -m pytest tests/unit/ -v

  bats-test:
    name: bats shell tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats ssss
      - name: bats tests/bats/
        run: bats tests/bats/

  snapshot:
    name: jinja snapshot diff
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install pinned tooling
        run: pip install --require-hashes --no-deps -r requirements.txt
      - name: render-snapshots check
        run: python3 scripts/render-snapshots.py

  validate-schema:
    name: secrets schema (lenient on example)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install pinned tooling
        run: pip install --require-hashes --no-deps -r requirements.txt
      - name: validate-secrets (lenient on example schema)
        run: python3 scripts/validate-secrets.py

  tf-test:
    name: terraform test (${{ matrix.provider }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        provider: [upcloud, hetzner, vultr]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4
        with:
          terraform_version: "1.15.2"
      - name: terraform init -backend=false
        working-directory: terraform/providers/${{ matrix.provider }}
        run: terraform init -backend=false
      - name: terraform test
        working-directory: terraform/providers/${{ matrix.provider }}
        run: terraform test

  vpnd-test:
    name: vpnd cargo test
    uses: ./.github/workflows/_rust.yml
    with:
      target: x86_64-unknown-linux-gnu
      cargo-command: test --release

  vpnd-clippy:
    name: vpnd cargo clippy
    uses: ./.github/workflows/_rust.yml
    with:
      target: x86_64-unknown-linux-gnu
      cargo-command: clippy --release --all-targets -- -D warnings

  molecule-failure-scenarios:
    # Non-default Molecule scenarios that exercise red-path / failure
    # injection. Today: watchdog/failure (stub ntfy listener captures
    # the alert when xray probes go red). Other roles get an entry
    # here when they grow their own failure scenario.
    name: molecule failure (${{ matrix.role }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: watchdog
            scenario: failure
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install pinned tooling
        run: |
          pip install --require-hashes --no-deps -r requirements.txt
          ansible-galaxy collection install -r requirements.yml
      - name: molecule test -s ${{ matrix.scenario }}
        working-directory: ansible/roles/${{ matrix.role }}
        run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
