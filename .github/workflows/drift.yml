---
name: drift-since-tag

# Runs every Monday at 12:00 UTC. Diffs the repository against the last
# vpn-deploy-known-good-* tag (section [1/3] of drift-since-tag.sh only).
#
# Threat-model note: CI cannot decrypt SOPS secrets or reach live provider
# APIs (secrets-outside-the-repo invariant). --repo-only limits the script
# to the git-log section. Operator-side drift detection against live servers
# stays operator-bound via the install-operator-crons path.
on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  drift:
    name: repo drift since last known-good tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run drift-since-tag (repo-only mode)
        id: drift
        run: |
          set +e
          output="$(bash scripts/drift-since-tag.sh --repo-only 2>&1)"
          exit_code=$?
          set -e

          # Detect whether any commits exist since the tag.
          # The script exits 2 when no known-good tag exists yet — treat
          # that as drift so the operator is prompted to create the first tag.
          if echo "$output" | grep -qE '^\[1/3\]' && \
             ! echo "$output" | grep -qP '^\[1/3\].*\n.*\(none\)' 2>/dev/null; then
            # Simpler: check for actual commit lines after [1/3] header.
            # git log --oneline produces "<sha> <msg>" lines; if the block
            # between [1/3] and [2/3] is non-empty, there is drift.
            commits="$(echo "$output" | \
              awk '/^\[1\/3\]/{found=1; next} /^\[2\/3\]/{found=0} found && /^[0-9a-f]/{print}')"
          else
            commits=""
          fi

          has_drift="false"
          if [[ $exit_code -ne 0 ]] || [[ -n "$commits" ]]; then
            has_drift="true"
          fi

          # Export for the next step — multiline-safe via $GITHUB_OUTPUT
          {
            echo "has_drift=${has_drift}"
            echo "exit_code=${exit_code}"
            echo "output<<DRIFT_EOF"
            echo "$output" | head -c 60000
            echo "DRIFT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update drift tracking issue
        if: steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          DRIFT_OUTPUT: ${{ steps.drift.outputs.output }}
          DRIFT_EXIT_CODE: ${{ steps.drift.outputs.exit_code }}
        with:
          script: |
            const label = 'automation:drift';
            const today = new Date().toISOString().slice(0, 10);
            const title = `Repo drift detected since last known-good tag — ${today}`;
            const driftOutput = process.env.DRIFT_OUTPUT || '(no output)';
            const exitCode = process.env.DRIFT_EXIT_CODE;

            const body = [
              '## Drift report',
              '',
              `Scheduled drift check ran on ${today} and detected repository drift ` +
              `since the last \`vpn-deploy-known-good-*\` tag (exit code: ${exitCode}).`,
              '',
              'Only the **repo-only** section is shown below (git log since tag).',
              'Terraform plan and Ansible --check require operator-side credentials;',
              'run `make drift-since-tag` locally for the full report.',
              '',
              '```',
              driftOutput.slice(0, 55000),
              '```',
              '',
              `_Generated by [drift.yml](../.github/workflows/drift.yml) — ${today}_`,
            ].join('\n');

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'e4e669',
                  description: 'Automated drift detection result',
                });
              }
            }

            // Look for an existing open drift issue to update (rolling)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: title,
                body: body,
              });
              core.notice(`Updated existing drift issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
              core.notice(`Opened drift issue #${created.data.number}`);
            }
