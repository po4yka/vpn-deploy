---
name: tf-policy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conftest:
    name: conftest (${{ matrix.provider }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        provider:
          - upcloud
          - hetzner
          - vultr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4
        with:
          terraform_version: "1.15.2"

      - name: install conftest
        # Conftest 0.57.0 — pinned SHA256 verified against upstream release
        # https://github.com/open-policy-agent/conftest/releases/tag/v0.57.0
        run: |
          curl -sSL \
            https://github.com/open-policy-agent/conftest/releases/download/v0.57.0/conftest_0.57.0_Linux_x86_64.tar.gz \
            -o conftest.tar.gz
          echo "db1018a7e301cada4d4bd8a70880a13314daae27b3f4d409c7ffba1847718392  conftest.tar.gz" | sha256sum -c -
          tar xf conftest.tar.gz conftest
          sudo install conftest /usr/local/bin/

      - name: terraform native tests
        working-directory: terraform/providers/${{ matrix.provider }}
        run: |
          terraform init -backend=false
          terraform test

      - name: conftest policy unit tests
        run: conftest verify --rego-version v0 -p terraform/policy/
