---
name: real-vps-deploy

# Ephemeral end-to-end deploy gate. Provisions a fresh UpCloud VPS,
# runs site.yml + verify against it, then destroys
# everything. Approximates a production deploy as closely as the CI
# environment allows — closer than the docker-only molecule scenarios
# can.
#
# Triggered manually (workflow_dispatch) or by adding the
# `ci-real-deploy` label to a pull request. Not on every push: this
# burns provider credit and runs ~15-20 minutes.
#
# Required secrets:
#   UPCLOUD_USERNAME             sub-account with VPS create + destroy
#   UPCLOUD_PASSWORD             …
#   CI_SOPS_AGE_KEY              age private key for the synthetic
#                                CI secrets file (separate from any
#                                operator key)
#   CI_SSH_PRIVATE_KEY           SSH key for the ephemeral VPS
#
# A single concurrency group ensures only one real-VPS-deploy runs at
# a time across the repo, so we never race two provisions against the
# UpCloud account.

on:
  workflow_dispatch:
    inputs:
      zone:
        description: "UpCloud zone (e.g. fi-hel1, de-fra1)"
        required: false
        default: "fi-hel1"
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  deploy:
    # Manually-triggered, or PR labeled `ci-real-deploy`.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-real-deploy'))
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    # Cross-distro matrix. Both entries fan out only when their template
    # secret is populated; an empty template short-circuits the matrix
    # entry with a warning at the first step (so an operator who hasn't
    # set CI_UPCLOUD_TEMPLATE_UUID_UBUNTU24 keeps the Debian-only flow).
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian13
          - distro: ubuntu2404

    name: real-vps-deploy (${{ matrix.distro }})
    # Distinct group per distro so a Debian fan-out can run alongside an
    # Ubuntu one. Within a distro, serialise — we still don't want two
    # parallel provisions for the same template against UpCloud.
    concurrency:
      group: real-vps-deploy-${{ matrix.distro }}
      cancel-in-progress: false

    env:
      UPCLOUD_USERNAME: ${{ secrets.UPCLOUD_USERNAME }}
      UPCLOUD_PASSWORD: ${{ secrets.UPCLOUD_PASSWORD }}
      ANSIBLE_HOST_KEY_CHECKING: "False"
      MATRIX_DISTRO: ${{ matrix.distro }}
      CI_UPCLOUD_TEMPLATE_UUID_DEBIAN13: ${{ secrets.CI_UPCLOUD_TEMPLATE_UUID }}
      CI_UPCLOUD_TEMPLATE_UUID_UBUNTU24: ${{ secrets.CI_UPCLOUD_TEMPLATE_UUID_UBUNTU24 }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Refuse to run on a fork PR
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::real-vps-deploy will not run on a fork PR — secrets are not exposed to forks."
          exit 1

      - name: Short-circuit when this matrix entry has no template UUID
        id: gate
        run: |
          case "${MATRIX_DISTRO}" in
            debian13)
              MATRIX_TEMPLATE_UUID="${CI_UPCLOUD_TEMPLATE_UUID_DEBIAN13}"
              template_secret_name="CI_UPCLOUD_TEMPLATE_UUID"
              ;;
            ubuntu2404)
              MATRIX_TEMPLATE_UUID="${CI_UPCLOUD_TEMPLATE_UUID_UBUNTU24}"
              template_secret_name="CI_UPCLOUD_TEMPLATE_UUID_UBUNTU24"
              ;;
            *)
              echo "::error::Unknown matrix distro: ${MATRIX_DISTRO}"
              exit 1
              ;;
          esac
          if [ -z "${MATRIX_TEMPLATE_UUID:-}" ]; then
            echo "::notice::${MATRIX_DISTRO} has no template UUID configured;"
            echo "::notice::secret ${template_secret_name} is empty — skipping this matrix entry."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "MATRIX_TEMPLATE_UUID=${MATRIX_TEMPLATE_UUID}" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify required secrets are present
        if: steps.gate.outputs.skip != 'true'
        run: |
          for v in UPCLOUD_USERNAME UPCLOUD_PASSWORD CI_SOPS_AGE_KEY CI_SSH_PRIVATE_KEY MATRIX_TEMPLATE_UUID; do
            if [ -z "${!v:-}" ] && [ -z "$(printenv "$v" || true)" ]; then
              echo "::error::Secret $v is unset — configure it in repo settings."
              exit 1
            fi
          done
        env:
          CI_SOPS_AGE_KEY: ${{ secrets.CI_SOPS_AGE_KEY }}
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}

      - name: Set up tooling
        if: steps.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip jq age
          curl -fsSL "https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64" -o /tmp/sops
          echo "0d65660fbe785647ff4f1764d7f69edf598f79d6d79ebbef4a501909b6ff6b82  /tmp/sops" | sha256sum -c -
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          curl -fsSL "https://releases.hashicorp.com/terraform/1.9.5/terraform_1.9.5_linux_amd64.zip" -o /tmp/tf.zip
          echo "9cf727b4d6bd2d4d2908f08bd282f9e4809d6c3071c3b8ebe53558bee6dc913b  /tmp/tf.zip" | sha256sum -c -
          (cd /tmp && unzip -o tf.zip && sudo install -m 0755 terraform /usr/local/bin/terraform)
          pip3 install --user --require-hashes --no-deps -r requirements.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stage SSH key + age key + CI tfvars
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh ~/.config/vpn-provision
          chmod 0700 ~/.ssh ~/.config/vpn-provision
          printf '%s\n' "${{ secrets.CI_SSH_PRIVATE_KEY }}" > ~/.ssh/vpn_deploy
          chmod 0600 ~/.ssh/vpn_deploy
          ssh-keygen -y -f ~/.ssh/vpn_deploy > ~/.ssh/vpn_deploy.pub
          printf '%s\n' "${{ secrets.CI_SOPS_AGE_KEY }}" > ~/.config/vpn-provision/age.key
          chmod 0600 ~/.config/vpn-provision/age.key
          # CI tfvars: short-lived ephemeral env name. Distro suffix
          # keeps the matrix entries' state files / hostnames apart so
          # we never confuse two parallel provisions.
          ts="$(date -u +%Y%m%d-%H%M%S)"
          ci_env="ci-${{ github.run_id }}-${MATRIX_DISTRO}-${ts}"
          server_name="vpn-${ci_env}.ci.test"
          echo "CI_ENV=${ci_env}" >> "$GITHUB_ENV"
          echo "CI_SERVER_NAME=${server_name}" >> "$GITHUB_ENV"
          cat > "terraform/providers/upcloud/environments/${ci_env}.tfvars" <<TFVARS
          server_name          = "${server_name}"
          zone                 = "${{ github.event.inputs.zone || 'fi-hel1' }}"
          plan                 = "1xCPU-2GB"
          storage_template     = "${MATRIX_TEMPLATE_UUID}"
          admin_ssh_public_key = file("~/.ssh/vpn_deploy.pub")
          allowed_ssh_cidrs    = ["0.0.0.0/0"]
          build_env            = "${ci_env}"
          TFVARS

      - name: Generate synthetic CI secrets
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export SECRETS_FILE="/tmp/vpn-${CI_ENV}.secrets.yaml"
          OUT="$SECRETS_FILE" SERVER_NAME="$CI_SERVER_NAME" CLIENT_NAME="ci-test" \
            ./scripts/ci-bootstrap-secrets.sh
          echo "SECRETS_FILE=$SECRETS_FILE" >> "$GITHUB_ENV"

      - name: Deploy
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export ENV="$CI_ENV"
          export PROVIDER=upcloud
          export ANSIBLE_SSH_PRIVATE_KEY_FILE="$HOME/.ssh/vpn_deploy"
          # Self-signed cert + placeholder geodata URLs trip
          # spot-check-secrets and check-certs; CI deploys with the
          # pre-deploy-check chain skipped. The deploy still runs
          # ansible's per-role validate-before-restart, so a broken
          # render still fails the job.
          export SKIP_PRECHECK=1
          # Disable roles whose runtime needs a real upstream or
          # platform feature CI can't reproduce.
          export ANSIBLE_EXTRA_VARS="vpn.enable_amneziawg=false vpn.enable_geodata=false vpn.enable_backup=false"
          ANSIBLE_EXTRA_VARS="${ANSIBLE_EXTRA_VARS} vpn.enable_monitoring=false vpn.enable_warp_outbound=false"
          ANSIBLE_EXTRA_VARS="${ANSIBLE_EXTRA_VARS} vpn.enable_honeypot=false vpn.enable_probe_ratelimit=false"
          make init plan apply inventory wait
          VPN_SECRETS_FILE=$SECRETS_FILE \
            ansible-playbook ansible/playbooks/site.yml --extra-vars "$ANSIBLE_EXTRA_VARS"
          VPN_SECRETS_FILE=$SECRETS_FILE \
            ansible-playbook ansible/playbooks/verify.yml --extra-vars "$ANSIBLE_EXTRA_VARS"

      - name: Always destroy the ephemeral VPS
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export ENV="$CI_ENV"
          export PROVIDER=upcloud
          # Skip the double-confirmation prompt — CI is the explicit
          # destroy authority for these short-lived envs.
          echo "yes" | echo "yes" | make destroy || true

      - name: Cleanup CI tfvars file
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          rm -f "terraform/providers/upcloud/environments/${CI_ENV}.tfvars" || true
