---
name: branch-protection
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to protect (default main)
        required: false
        default: main

permissions:
  contents: read

jobs:
  apply:
    name: apply branch protection
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Sanity-check the PAT secret
        env:
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          if [[ -z "${BRANCH_PROTECTION_TOKEN}" ]]; then
            echo "Missing secret BRANCH_PROTECTION_TOKEN — see docs/BRANCH-PROTECTION.md" >&2
            exit 1
          fi

      - name: Apply protection
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"

          # Required status checks must match exactly the job names in
          # .github/workflows/ci.yml + codeql.yml.
          CONTEXTS=$(jq -nc '[
            "gitleaks",
            "terraform fmt + validate (upcloud)",
            "terraform fmt + validate (hetzner)",
            "terraform fmt + validate (vultr)",
            "cloud-init schema",
            "ansible-lint + syntax-check",
            "molecule (baseline)",
            "molecule (firewall)",
            "molecule (xray)",
            "molecule (hysteria)",
            "molecule (nginx-xhttp)",
            "molecule (watchdog)",
            "molecule (monitoring)",
            "molecule (backup)",
            "molecule (subscription-host)",
            "shellcheck",
            "secrets-coverage",
            "templates-render",
            "yamllint",
            "codeql (python)",
            "codeql (actions)"
          ]')

          PAYLOAD=$(jq -nc --argjson contexts "$CONTEXTS" '{
            required_status_checks: {
              strict: true,
              contexts: $contexts
            },
            enforce_admins: false,
            required_pull_request_reviews: {
              required_approving_review_count: 1,
              dismiss_stale_reviews: true,
              require_code_owner_reviews: true
            },
            restrictions: null,
            allow_force_pushes: false,
            allow_deletions: false,
            required_linear_history: true,
            required_conversation_resolution: true,
            block_creations: false
          }')

          echo "Applying to ${REPO}:${BRANCH}…"
          gh api -X PUT "repos/${REPO}/branches/${BRANCH}/protection" \
            -H "Accept: application/vnd.github+json" \
            --input - <<<"$PAYLOAD" | jq '.required_status_checks.contexts | length'

          echo "Done."
