---
name: claude-md-touch

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: warn if CLAUDE.md not touched
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Collect changed files
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Check CLAUDE.md coverage
        shell: bash
        run: |
          set -euo pipefail

          # Map each changed file to the CLAUDE.md that should cover it.
          # Rules (first match wins):
          #   ansible/roles/<name>/  -> ansible/roles/<name>/CLAUDE.md
          #   terraform/providers/<name>/ -> terraform/providers/<name>/CLAUDE.md
          #   terraform/shared/      -> terraform/shared/CLAUDE.md
          #   scripts/               -> scripts/CLAUDE.md
          #   tests/                 -> tests/CLAUDE.md
          #   vpnd/src/              -> vpnd/CLAUDE.md

          declare -A needed   # needed[claude_md]=1 when the folder is affected
          declare -A present  # present[claude_md]=1 when it's also in the diff

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            # Determine which CLAUDE.md governs this file
            claude_md=""
            case "$f" in
              ansible/roles/*/*)
                role="$(echo "$f" | cut -d/ -f3)"
                claude_md="ansible/roles/${role}/CLAUDE.md"
                ;;
              terraform/providers/*/*)
                provider="$(echo "$f" | cut -d/ -f3)"
                claude_md="terraform/providers/${provider}/CLAUDE.md"
                ;;
              terraform/shared/*)
                claude_md="terraform/shared/CLAUDE.md"
                ;;
              scripts/*)
                claude_md="scripts/CLAUDE.md"
                ;;
              tests/*)
                claude_md="tests/CLAUDE.md"
                ;;
              vpnd/src/*)
                claude_md="vpnd/CLAUDE.md"
                ;;
              *)
                # File outside tracked folders — no CLAUDE.md requirement
                continue
                ;;
            esac

            # Skip if the file itself IS the CLAUDE.md
            if [ "$f" = "$claude_md" ]; then
              present["$claude_md"]=1
              continue
            fi

            needed["$claude_md"]=1
          done < /tmp/changed_files.txt

          # Second pass: mark which required CLAUDE.mds appear in the diff
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -n "${needed[$f]+set}" ]; then
              present["$f"]=1
            fi
          done < /tmp/changed_files.txt

          # Emit warnings for folders touched but CLAUDE.md not updated
          exit_code=0
          for claude_md in "${!needed[@]}"; do
            if [ -z "${present[$claude_md]+set}" ]; then
              msg="${claude_md} was not updated in this PR."
              msg="${msg} Consider adding design decisions, pitfalls, or status notes."
              echo "::warning file=${claude_md}::${msg}"
            fi
          done

          exit $exit_code
