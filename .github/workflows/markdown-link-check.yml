---
name: markdown-link-check
on:
  pull_request:
    paths:
      - "**/*.md"
      - ".lycheeignore"
      - ".github/workflows/markdown-link-check.yml"
  schedule:
    - cron: '0 4 * * 1'   # Monday 04:00 UTC

permissions:
  contents: read

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --timeout 20
            --retry-wait-time 5
            --max-retries 2
            --exclude-mail
            --exclude-path archive
            './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
