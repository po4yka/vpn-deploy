---
name: release-vpnd

on:
  push:
    tags:
      - 'vpnd-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: vpnd
          key: ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: ${{ matrix.cross }}
        working-directory: vpnd
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: vpnd
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross — aarch64-unknown-linux-gnu)
        if: ${{ matrix.cross }}
        working-directory: vpnd
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary with target suffix
        shell: bash
        run: |
          src="vpnd/target/${{ matrix.target }}/release/vpnd"
          dst="vpnd-${{ matrix.target }}"
          cp "${src}" "${dst}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: vpnd-${{ matrix.target }}
          path: vpnd-${{ matrix.target }}
          retention-days: 1

  release:
    name: attach release assets
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum vpnd-* | tee SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/vpnd-x86_64-unknown-linux-gnu
            dist/vpnd-aarch64-unknown-linux-gnu
            dist/vpnd-x86_64-apple-darwin
            dist/vpnd-aarch64-apple-darwin
            dist/SHA256SUMS
