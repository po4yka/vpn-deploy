---
name: release-vpnd

on:
  push:
    tags:
      - 'vpnd-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x86_64-linux:
    name: build (x86_64-unknown-linux-gnu)
    uses: ./.github/workflows/_rust.yml
    with:
      target: x86_64-unknown-linux-gnu
      cargo-command: build --release
      cross: false
      upload-binary: true

  build-aarch64-linux:
    name: build (aarch64-unknown-linux-gnu)
    uses: ./.github/workflows/_rust.yml
    with:
      target: aarch64-unknown-linux-gnu
      cargo-command: build --release
      cross: true
      upload-binary: true

  build-x86_64-macos:
    name: build (x86_64-apple-darwin)
    uses: ./.github/workflows/_rust.yml
    with:
      target: x86_64-apple-darwin
      cargo-command: build --release
      cross: false
      upload-binary: true

  build-aarch64-macos:
    name: build (aarch64-apple-darwin)
    uses: ./.github/workflows/_rust.yml
    with:
      target: aarch64-apple-darwin
      cargo-command: build --release
      cross: false
      upload-binary: true

  attest:
    name: attest (${{ matrix.target }})
    needs:
      - build-x86_64-linux
      - build-aarch64-linux
      - build-x86_64-macos
      - build-aarch64-macos
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: vpnd-${{ matrix.target }}
          path: dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/vpnd-${{ matrix.target }}

      - name: Re-upload attested artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: attested-vpnd-${{ matrix.target }}
          path: dist/vpnd-${{ matrix.target }}
          retention-days: 1

  release:
    name: attach release assets
    needs: attest
    runs-on: ubuntu-24.04
    # contents: write is required for softprops/action-gh-release to publish the
    # GitHub release and upload assets. Scoped to this job only; the top-level
    # token is read-only and the action is on Scorecard's recognized-release-
    # action allowlist (Token-Permissions check does not penalize this).
    permissions:
      contents: write

    steps:
      - name: Download all attested binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: attested-vpnd-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum vpnd-* | tee SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/vpnd-x86_64-unknown-linux-gnu
            dist/vpnd-aarch64-unknown-linux-gnu
            dist/vpnd-x86_64-apple-darwin
            dist/vpnd-aarch64-apple-darwin
            dist/SHA256SUMS
