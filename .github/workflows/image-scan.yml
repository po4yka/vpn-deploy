---
name: image-scan

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enumerate-images:
    name: enumerate base images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.images.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Collect base images from molecule scenarios
        id: images
        run: |
          images=$(grep -rh 'image:' ansible/roles/*/molecule/*/molecule.yml \
            | awk '{print $2}' \
            | grep -v '^true$' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=${images}" >> "$GITHUB_OUTPUT"

  scan:
    name: trivy (${{ matrix.image }})
    needs: enumerate-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.enumerate-images.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.31.0
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}
