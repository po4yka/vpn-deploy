---
name: release-please
on:
  push:
    branches: [main]
  workflow_dispatch:

# Top-level permissions are read-only by default; the release job
# elevates to write at job level so OSSF-Scorecard's
# Token-Permissions check still passes.
permissions:
  contents: read

jobs:
  release:
    name: release-please
    runs-on: ubuntu-24.04
    # release-please can't run unless the operator has enabled
    # Settings → Actions → General → "Allow GitHub Actions to create
    # and approve pull requests". Until that's on the run will fail
    # with "GitHub Actions is not permitted to create or approve pull
    # requests" — that's a setup gate, not a repo-correctness issue.
    # continue-on-error keeps the overall workflow green so unrelated
    # CI checks aren't masked by release-please's setup state.
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
