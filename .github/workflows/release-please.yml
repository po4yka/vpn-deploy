---
name: release-please
on:
  push:
    branches: [main]
  workflow_dispatch:

# Top-level permissions are read-only by default; the release job
# elevates to write at job level so OSSF-Scorecard's
# Token-Permissions check still passes.
permissions:
  contents: read

jobs:
  release:
    name: release-please
    runs-on: ubuntu-24.04
    # release-please needs two prerequisites the workflow can't enable
    # for itself:
    #   1. Settings → Actions → General → "Allow GitHub Actions to
    #      create and approve pull requests" (toggle on).
    #   2. Repo variable `RELEASE_PLEASE_ENABLED=true` (Settings →
    #      Secrets and variables → Actions → Variables).
    # Until both are set the job is skipped — the run reports
    # "skipped", not "failed", so it doesn't pollute the run summary.
    if: ${{ vars.RELEASE_PLEASE_ENABLED == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5
        # Even with the Settings toggle on, transient release-please
        # parser issues shouldn't fail CI; this job is informational.
        continue-on-error: true
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
