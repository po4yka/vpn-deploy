---
# Dependabot config: weekly updates per ecosystem, grouped to keep PR
# count low. Auto-merge intentionally disabled — every PR runs through the
# full CI matrix and a human merges.
#
# Limitations:
#   - Ansible Galaxy collections (requirements.yml) are NOT covered by
#     Dependabot. Refresh manually each quarter; see docs/TESTING.md
#     "Dependency updates".
version: 2

updates:
  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      gh-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions

  # Terraform provider versions per provider root
  - package-ecosystem: terraform
    directory: /terraform/providers/upcloud
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    groups:
      tf-upcloud:
        patterns:
          - "*"
    labels:
      - dependencies
      - terraform

  - package-ecosystem: terraform
    directory: /terraform/providers/hetzner
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - terraform

  - package-ecosystem: terraform
    directory: /terraform/providers/vultr
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - terraform

  # Python tooling pinned in requirements.txt (ansible-core, ansible-lint,
  # molecule, yamllint, jmespath)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      pip-runtime:
        patterns:
          - "ansible-core"
          - "ansible-lint"
          - "molecule*"
          - "yamllint"
          - "jmespath"
    labels:
      - dependencies
      - python
