name: Bug report
description: Something is broken or behaves unexpectedly.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Before filling this out, **double-check that
        you are not pasting any secrets** — UUIDs, REALITY private keys,
        Hysteria passwords, AWG keys, subscription tokens. The CI's
        gitleaks rules are not retroactive on issue text.

        For **active probing / IP burn / leaked credentials**: do NOT open
        a public issue. Follow `SECURITY.md`.

  - type: input
    id: provider-env
    attributes:
      label: Provider / env
      description: Which Terraform provider and environment exhibits this?
      placeholder: "upcloud / prod"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Terraform — provider module
        - Terraform — cloud-init
        - Ansible — role baseline / firewall / xray
        - Ansible — role nginx-xhttp / hysteria / amneziawg
        - Ansible — role monitoring / watchdog / backup
        - Ansible — role subscription-host / geodata / naive
        - Ansible — playbook (site / verify / rollback / rotate / smoke-test)
        - Script (scripts/*.sh, scripts/*.py)
        - Documentation
        - CI / GitHub automation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands run, in order. Redact any secrets.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Logs, error messages. **Redact secrets first.**
      render: shell
    validations:
      required: true

  - type: input
    id: runbook
    attributes:
      label: Relevant runbook
      description: Which `docs/RUNBOOK-*.md` (if any) covers this scenario?
      placeholder: "docs/RUNBOOK-rollback.md"

  - type: input
    id: versions
    attributes:
      label: Versions
      description: terraform, ansible-core, OS, role/script if pinned
      placeholder: "terraform 1.13.0, ansible-core 2.19.0, Debian 13"
    validations:
      required: true
