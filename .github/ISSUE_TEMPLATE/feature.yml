name: Feature request
description: Propose a new role, transport profile, or operator workflow.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What new behaviour or component does this add?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        What operational gap does this close? Cite a real failure mode if
        possible (e.g. "P3 reachability layer is currently undocumented;
        operator hits this when mobile whitelist enforcement triggers").
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Why not a different approach? Particularly relevant if the
        proposal touches the things this repo deliberately avoids
        (Cloudflare-fronted CDN as RU baseline, Docker/K8s on data plane,
        public admin panel, calendar-based rotation).
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Links to upstream docs, RFCs, release notes, or threat-model
        analysis that justify this proposal. New features without
        grounding tend to sit in triage.

  - type: textarea
    id: testing
    attributes:
      label: Testing approach
      description: |
        Which CI gates would cover this (molecule, render check, smoke
        test)? See `docs/TESTING.md` for the coverage matrix.
