---
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --tf-init-args=-backend=false

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint.yml']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ['-s', 'bash', '-S', 'warning']

  - repo: local
    hooks:
      - id: secrets-coverage
        name: secrets-coverage (template vars must be in example secrets)
        entry: python3 scripts/check-secrets-coverage.py
        language: system
        pass_filenames: false
        files: ^(secrets/prod\.secrets\.example\.yaml|ansible/.*\.j2)$

      - id: templates-render
        name: templates-render (Jinja syntax + JSON / nginx structural validity)
        entry: python3 scripts/check-templates-render.py
        language: system
        pass_filenames: false
        files: ^(ansible/.*\.j2|secrets/prod\.secrets\.example\.yaml|ansible/group_vars/.*\.yml)$

      - id: placeholder-scan
        name: placeholder-scan (no REPLACE_WITH_* outside schema/docs)
        entry: python3 scripts/pre-commit-placeholder-scan.py
        language: system
        types: [text]

      - id: snapshot-check
        name: snapshot-check (Jinja renders match tests/snapshot/golden/)
        entry: python3 scripts/render-snapshots.py
        language: system
        pass_filenames: false
        files: ^(ansible/.*\.j2|ansible/group_vars/.*\.yml|ansible/roles/.*/defaults/main\.yml|secrets/prod\.secrets\.example\.yaml|tests/snapshot/golden/.*)$
