# Placeholder secrets schema. Copy to ~/.config/vpn-provision/prod.secrets.yaml
# and fill with real values. Do NOT put real values here in this repo file.
#
# Every key in this file is consumed by an Ansible role at deploy time:
#   xray.*               → roles/xray
#   nginx_xhttp.*        → roles/nginx-xhttp
#   hysteria.*           → roles/hysteria
#   amneziawg_secrets.*  → roles/amneziawg
#   backup.*             → roles/backup
#   subscription.*       → roles/subscription-host (optional)

xray:
  version: "v26.3.27"  # current Xray-core stable; verify against upstream releases page
  linux_amd64_sha256: "REPLACE_WITH_RELEASE_SHA256"
  linux_arm64_sha256: "REPLACE_WITH_RELEASE_SHA256"

  # REALITY: generate with `xray x25519`
  reality_private_key: "REPLACE_WITH_PRIVATE_KEY"
  reality_public_key:  "REPLACE_WITH_PUBLIC_KEY"

  # SNI target hygiene — see reality-target-selection-2026
  target: "www.cloudflare.com:443"
  server_names:
    - "www.cloudflare.com"

  # XHTTP path used by P1 fallback inbound (see roles/xray/templates/config.json.j2)
  xhttp_path: "/app-sync"

  clients:
    - name: phone
      uuid: "REPLACE_WITH_UUID"
      short_id: "REPLACE_WITH_8HEX"
    # add more via scripts/new-client.sh

nginx_xhttp:
  server_name: "vpn.example.com"     # plausible domain; you control DNS for it
  cert_pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_FULLCHAIN
    -----END CERTIFICATE-----
  key_pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PRIVATE_KEY
    -----END PRIVATE KEY-----

hysteria:
  version: "v2.8.2"
  linux_amd64_sha256: "REPLACE_WITH_RELEASE_SHA256"
  linux_arm64_sha256: "REPLACE_WITH_RELEASE_SHA256"

  # Reuse the public-CA cert from nginx_xhttp if same domain, or use a separate one.
  cert_pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_FULLCHAIN
    -----END CERTIFICATE-----
  key_pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PRIVATE_KEY
    -----END PRIVATE KEY-----

  bandwidth_up:   "100 mbps"
  bandwidth_down: "200 mbps"

  # Salamander obfuscation: keep disabled by default. See
  # multi-profile-access-stack-2026 §"Salamander policy" before enabling.
  salamander_enabled: false
  salamander_password: "REPLACE_WITH_STRONG_PASSWORD_IF_ENABLED"

  clients:
    - name: phone
      password: "REPLACE_WITH_PER_DEVICE_PASSWORD"

amneziawg_secrets:
  server_private_key: "REPLACE_WITH_AWG_PRIVATE_KEY"

  # Per-AmneziaWG-spec obfuscation parameters; generate or pick a stable set
  # and keep it consistent with what the Amnezia client expects.
  jc:   4
  jmin: 40
  jmax: 70
  s1:   50
  s2:   100
  h1:   "REPLACE_WITH_H1_INT"
  h2:   "REPLACE_WITH_H2_INT"
  h3:   "REPLACE_WITH_H3_INT"
  h4:   "REPLACE_WITH_H4_INT"

  peers:
    - name: phone
      public_key:    "REPLACE_WITH_PEER_PUBLIC_KEY"
      preshared_key: "REPLACE_WITH_PRESHARED_KEY"
      allowed_ips:   "10.66.66.2/32"
    # add more via scripts/new-client.sh

backup:
  # Generate with: openssl rand -base64 32
  restic_password: "REPLACE_WITH_LONG_RANDOM"

# Optional: only needed if vpn.enable_subscription_host is true
# subscription:
#   port: 8444
#   server_name: "sub.example.com"
