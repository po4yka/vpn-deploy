# Placeholder secrets schema. Copy to ~/.config/vpn-provision/prod.secrets.yaml
# and fill with real values. Do NOT put real values here in this repo file.
#
# Every key in this file is consumed by an Ansible role at deploy time:
#   xray.*               → roles/xray
#   nginx_xhttp.*        → roles/nginx-xhttp
#   hysteria.*           → roles/hysteria
#   geodata.*            → roles/geodata
#   amneziawg_*_version  → roles/amneziawg source pins
#   amneziawg_secrets.*  → roles/amneziawg
#   backup.*             → roles/backup
#   subscription.*       → roles/subscription-host (optional)

xray:
  version: "v26.3.27"  # current Xray-core stable; verify against upstream releases page
  linux_amd64_sha256: "REPLACE_WITH_RELEASE_SHA256"
  linux_arm64_sha256: "REPLACE_WITH_RELEASE_SHA256"

  # REALITY: generate with `xray x25519`
  reality_private_key: "REPLACE_WITH_PRIVATE_KEY"
  reality_public_key: "REPLACE_WITH_PUBLIC_KEY"

  # SNI target hygiene — validate with `make validate-target` before deploy.
  #
  # Pick a target that:
  #   1. Speaks TLS 1.3 and ALPN h2.
  #   2. Has the candidate hostname covered by the certificate SAN.
  #   3. Lives on an IP whose ASN is plausible for your VPS (close in
  #      geography / hoster class — see docs/PROVIDER-NOTES.md).
  #   4. Is NOT in the over-template list (cloudflare.com, microsoft.com,
  #      apple.com, google.com, discord.com — refused by Xray v26.3.27 via
  #      warning; flagged by validate-reality-target.sh).
  #   5. Returns a real HTTP/2 response on `GET /` (no infinite redirect,
  #      no empty body).
  #   6. Is NOT a Russian PoP of Cloudflare or any other CDN that peers
  #      through AS1299 inside RU (see docs/CDN-DECISION.md).
  #
  # No safe public default exists — a default would itself become a
  # template the censor can train on. Fill it yourself and run
  # `make validate-target` before `make plan`. To discover candidates:
  #   make scan-targets CIDR=<cidr>     # scan an IP range
  #   make scan-targets CRAWL=<url>     # crawl + scan a mirror list page
  # The wrapper installs XTLS/RealiTLScanner v0.2.1 with sha256 check.
  target: "REPLACE_WITH_LOW_PROFILE_HTTPS_TARGET:443"
  server_names:
    - "REPLACE_WITH_LOW_PROFILE_HOSTNAME"

  # XHTTP path used by P1 fallback inbound (see roles/xray/templates/config.json.j2)
  xhttp_path: "/app-sync"

  clients:
    - name: phone
      uuid: "REPLACE_WITH_UUID"
      short_id: "REPLACE_WITH_8HEX"
    # add more via scripts/new-client.sh

  # Optional multi-cohort layout. When `cohorts` is empty or missing,
  # the xray role renders a single VLESS+REALITY inbound on xray_port
  # using vpn.xray_flow_mode (group_vars). When non-empty, one REALITY
  # inbound is generated per entry, sharing the REALITY identity above.
  # See docs/MULTI-COHORT.md for the rationale and when to use it.
  #
  # cohorts:
  #   - name: home-isp
  #     port: 443
  #     flow_mode: mux         # mux | vision
  #     finalmask: true
  #     clients: [phone]       # client names from xray.clients
  #   - name: foreign
  #     port: 8444
  #     flow_mode: vision
  #     finalmask: false
  #     clients: [laptop]
  cohorts: []

nginx_xhttp:
  server_name: "vpn.example.com"     # plausible domain; you control DNS for it
  cert_pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_FULLCHAIN
    -----END CERTIFICATE-----
  key_pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PRIVATE_KEY
    -----END PRIVATE KEY-----

hysteria:
  version: "v2.9.0"
  linux_amd64_sha256: "REPLACE_WITH_RELEASE_SHA256"
  linux_arm64_sha256: "REPLACE_WITH_RELEASE_SHA256"

  # Reuse the public-CA cert from nginx_xhttp if same domain, or use a separate one.
  cert_pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_FULLCHAIN
    -----END CERTIFICATE-----
  key_pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PRIVATE_KEY
    -----END PRIVATE KEY-----

  bandwidth_up: "100 mbps"
  bandwidth_down: "200 mbps"

  # Salamander obfuscation: keep disabled by default. Enabling trades a
  # vanilla-Hysteria fingerprint for high-entropy UDP, which can itself
  # be a network signal — only turn it on if vanilla Hysteria is being
  # classified on a target network.
  salamander_enabled: false
  salamander_password: "REPLACE_WITH_STRONG_PASSWORD_IF_ENABLED"

  clients:
    - name: phone
      password: "REPLACE_WITH_PER_DEVICE_PASSWORD"

naive_secrets:
  # Only needed when vpn.enable_naive is true (and vpn.enable_nginx_xhttp is false).
  server_name: "vpn.example.com"
  username: "REPLACE_WITH_USERNAME"
  password: "REPLACE_WITH_PASSWORD"
  probe_resistance_secret: "REPLACE_WITH_LONG_RANDOM"  # used as a "secret URL" to confirm a real client is on the other end
  cert_pem: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_FULLCHAIN
    -----END CERTIFICATE-----
  key_pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PRIVATE_KEY
    -----END PRIVATE KEY-----

geodata:
  geosite_url: "REPLACE_WITH_PINNED_GEOSITE_RELEASE_URL"
  geoip_url: "REPLACE_WITH_PINNED_GEOIP_RELEASE_URL"
  geosite_sha256: "REPLACE_WITH_RELEASE_SHA256"
  geoip_sha256: "REPLACE_WITH_RELEASE_SHA256"
  install_dir: /usr/local/share/xray
  refresh_interval: "1d"

amneziawg_go_version: "REPLACE_WITH_PINNED_TAG_OR_COMMIT"
amneziawg_tools_version: "REPLACE_WITH_PINNED_TAG_OR_COMMIT"

amneziawg_secrets:
  server_private_key: "REPLACE_WITH_AWG_PRIVATE_KEY"

  # Per-AmneziaWG-spec obfuscation parameters; generate or pick a stable
  # set and keep it consistent with what the Amnezia client expects.
  #
  # Cohort-specific known-good profiles (see docs/AWG-COHORTS.md). These
  # are starting points — measure on the target network before locking.
  #
  #   RTK South (Rostov Oblast, RTK Юг), 2026-05:
  #     jc=4 jmin=10 jmax=50 s1=0 s2=0 h1=1 h2=2 h3=3 h4=4
  #     (probabilistic pass — sometimes stalls on handshake)
  #
  #   MTS / Beeline / MegaFon mobile, 2026-05 baseline:
  #     jc=4 jmin=40 jmax=70 s1=50 s2=100 + random H1..H4
  #
  # Generate a random H1..H4 set with:
  #   for i in 1 2 3 4; do
  #     printf 'h%d: %s\n' "$i" "$(od -An -N4 -tu4 /dev/urandom | tr -d ' ')"
  #   done
  jc: 4
  jmin: 40
  jmax: 70
  s1: 50
  s2: 100
  h1: "REPLACE_WITH_H1_INT"
  h2: "REPLACE_WITH_H2_INT"
  h3: "REPLACE_WITH_H3_INT"
  h4: "REPLACE_WITH_H4_INT"

  peers:
    - name: phone
      public_key: "REPLACE_WITH_PEER_PUBLIC_KEY"
      preshared_key: "REPLACE_WITH_PRESHARED_KEY"
      allowed_ips: "10.66.66.2/32"
    # add more via scripts/new-client.sh

  # Optional multi-instance layout (see docs/AWG-COHORTS.md). When
  # `instances` is empty/missing, the role uses the single-instance
  # fields above. When non-empty, one awg-quick@<name>.service is
  # started per entry, each on its own UDP port + H1..H4 set.
  #
  # instances:
  #   - name: awg-rtk-south
  #     listen_port: 51820
  #     address_v4: "10.66.66.1/24"
  #     address_v6: "fd42:42:42::1/64"
  #     server_private_key: "..."
  #     jc: 4
  #     jmin: 10
  #     jmax: 50
  #     s1: 0
  #     s2: 0
  #     h1: 1
  #     h2: 2
  #     h3: 3
  #     h4: 4
  #     peers: [...]
  #   - name: awg-mts-mobile
  #     listen_port: 51821
  #     address_v4: "10.66.67.1/24"
  #     ...
  instances: []

backup:
  # Generate with: openssl rand -base64 32
  restic_password: "REPLACE_WITH_LONG_RANDOM"

  # Optional remote sync via rclone. Off by default; turning it on requires
  # a rclone_config blob that defines the rclone_remote name. Any backend
  # rclone supports works (S3, B2, Storj, SFTP, etc.).
  remote:
    enabled: false
    rclone_remote: "offsite"
    rclone_path: "vpn-backups"
    transfers: 4
    bwlimit: "off"   # e.g. "10M" for 10 MByte/s cap
    rclone_config: |
      [offsite]
      type = s3
      provider = Other
      env_auth = false
      access_key_id = REPLACE
      secret_access_key = REPLACE
      endpoint = https://s3.example.com
      region = us-east-1
      acl = private

watchdog_secrets:
  # ntfy.sh: pick a long random topic name and treat it as a secret
  # (anyone with the topic can read alerts).
  ntfy_topic: "REPLACE_WITH_LONG_RANDOM_TOPIC"
  # Optional access token if you self-host ntfy with auth.
  # ntfy_token: "REPLACE_WITH_NTFY_TOKEN"
  #
  # Or, if watchdog.provider == "pushover":
  # pushover_token: "REPLACE_WITH_APP_TOKEN"
  # pushover_user:  "REPLACE_WITH_USER_KEY"

# Optional: only needed if vpn.enable_subscription_host is true
# subscription:
#   port: 8444
#   server_name: "sub.example.com"
#   rate_limit: "5r/m"
#   rate_burst: 3
#   revoked_tokens:
#     - "REVOKED_TOKEN_HEX_1"
#     - "REVOKED_TOKEN_HEX_2"
